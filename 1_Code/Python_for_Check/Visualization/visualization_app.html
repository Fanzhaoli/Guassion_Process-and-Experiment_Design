  if (speChartInst) { speChartInst.destroy(); speChartInst = null; }
}

// === 主绘图函数 (优化版: 含置信区间带和趋势拟合线) ===
// 参考 ggcube 的 CI surface 和多层geom叠加设计
function updateCRFChart() {
  const loadingEl = document.getElementById('crfLoading');
  if (loadingEl) loadingEl.style.display = '';

  requestAnimationFrame(() => {
    const trials = getFilteredTrials();
    if (trials.length === 0) {
      document.getElementById('crfChartTitle').textContent = ' (无匹配数据)';
      if (loadingEl) loadingEl.style.display = 'none';
      clearCRFCharts();
      return;
    }
    const nQ = parseInt(document.getElementById('quantileSlider')?.value || 5);
    appState.quantileN = nQ;

    const selfTrials = trials.filter(t => t.Identity === 'Self');
    const strangerTrials = trials.filter(t => t.Identity === 'Stranger');
    
    _crfCache = { selfTrials: selfTrials.length, strangerTrials: strangerTrials.length, nQ };

    const crfSelfResult = computeCRF(selfTrials, nQ, _crfRTLog);
    const crfStrangerResult = computeCRF(strangerTrials, nQ, _crfRTLog);
    // d' mode: use separate d' computation
    const isDprime = _crfYMetric === 'dprime';
    const dprimeSelfResult = isDprime ? computeCRF_dprime(selfTrials, nQ, _crfRTLog) : null;
    const dprimeStrangerResult = isDprime ? computeCRF_dprime(strangerTrials, nQ, _crfRTLog) : null;
    const crfSelf = isDprime ? (dprimeSelfResult ? dprimeSelfResult.bins : null) : (crfSelfResult ? crfSelfResult.bins : null);
    const crfStranger = isDprime ? (dprimeStrangerResult ? dprimeStrangerResult.bins : null) : (crfStrangerResult ? crfStrangerResult.bins : null);
    _crfCache.overallACCSelf = crfSelfResult ? crfSelfResult.overallACC : 0;
    _crfCache.overallACCStranger = crfStrangerResult ? crfStrangerResult.overallACC : 0;
    _crfCache.nTotalSelf = crfSelfResult ? crfSelfResult.nTotal : 0;
    _crfCache.nTotalStranger = crfStrangerResult ? crfStrangerResult.nTotal : 0;

    const titleEl = document.getElementById('crfChartTitle');
    const isACC = _crfYMetric === 'acc';
    const useOverallACC = isACC && _crfACCMode === 'overall';
    const useBinACC = isACC && _crfACCMode === 'bin';
    const useBinIndex = _crfXAxisMode === 'binIndex';
    const yLabel = isDprime ? "d' (辨别力指数)" : (isACC ? (useOverallACC ? 'ACC (整体准确率)' : 'ACC (区间准确率)') : '匹配键选择比例 (P_Match_Response)');
    const xLabel = useBinIndex ? '分箱序号 (Bin Index)' : (_crfRTLog ? 'ln(RT)' : 'RT (秒)');
    titleEl.textContent = `(n=${trials.length}, Self=${selfTrials.length}, Stranger=${strangerTrials.length}, Q=${nQ})`;

    const ctx = document.getElementById('crfChart').getContext('2d');

    const textColor = appState.theme === 'light' ? '#5a6c7d' : '#90a4ae';
    const gridColor = appState.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)';
    const legendColor = appState.theme === 'light' ? '#2c3e50' : '#e0e0e0';

    const getYVal = (b, overallACC) => {
      if (isDprime) return b.dprime;
      if (useBinACC) return b.binACC;
      if (useOverallACC) return overallACC;
      return b.upperProp;
    };
    const getYSEM = (b) => {
      if (isDprime) return 0;  // d' SEM not computed per-bin
      if (useBinACC) return b.binACCSem;
      if (useOverallACC) return 0;
      return b.sem;
    };
    const getXVal = (b, idx) => useBinIndex ? (idx + 1) : b.rtMean;

    const overallACCSelf = crfSelfResult ? crfSelfResult.overallACC : 0;
    const overallACCStranger = crfStrangerResult ? crfStrangerResult.overallACC : 0;

    const datasets = [];

    if (crfSelf) {
      const selfXs = crfSelf.map((b, i) => getXVal(b, i));
      const selfYs = crfSelf.map(b => getYVal(b, overallACCSelf));
      const selfFit = polyFit(selfXs, selfYs, 2);
      if (selfFit) {
        const fitPoints = [];
        const xMin = selfXs[0], xMax = selfXs[selfXs.length - 1];
        const xRange = xMax - xMin || 0.001;
        for (let i = 0; i <= 60; i++) {
          const x = xMin + (xRange * i / 60);
          fitPoints.push({ x, y: predictPoly(selfFit, x) });
        }
        datasets.push({
          label: 'Self trend',
          data: fitPoints,
          borderColor: withAlpha('#ff9800', 0.5),
          backgroundColor: 'transparent',
          pointRadius: 0, borderWidth: 1.5, borderDash: [5, 3], tension: 0, showLine: true,
          order: 3,
        });
      }
      datasets.push({
        label: 'Self',
        data: crfSelf.map((b, i) => ({ x: getXVal(b, i), y: getYVal(b, overallACCSelf) })),
        borderColor: '#ff9800', backgroundColor: '#ff9800',
        pointRadius: 6, pointHoverRadius: 8, borderWidth: 2.5, tension: 0.1,
        order: 1,
      });
    }

    if (crfStranger) {
      const stXs = crfStranger.map((b, i) => getXVal(b, i));
      const stYs = crfStranger.map(b => getYVal(b, overallACCStranger));
      const stFit = polyFit(stXs, stYs, 2);
      if (stFit) {
        const fitPoints = [];
        const xMin = stXs[0], xMax = stXs[stXs.length - 1];
        const xRange = xMax - xMin || 0.001;
        for (let i = 0; i <= 60; i++) {
          const x = xMin + (xRange * i / 60);
          fitPoints.push({ x, y: predictPoly(stFit, x) });
        }
        datasets.push({
          label: 'Stranger trend',
          data: fitPoints,
          borderColor: withAlpha('#2196f3', 0.5),
          backgroundColor: 'transparent',
          pointRadius: 0, borderWidth: 1.5, borderDash: [5, 3], tension: 0, showLine: true,
          order: 3,
        });
      }
      datasets.push({
        label: 'Stranger',
        data: crfStranger.map((b, i) => ({ x: getXVal(b, i), y: getYVal(b, overallACCStranger) })),
        borderColor: '#2196f3', backgroundColor: '#2196f3',
        pointRadius: 6, pointHoverRadius: 8, borderWidth: 2.5, tension: 0.1,
        order: 1,
      });
    }

    // ACC整体模式: 添加水平参考线 (Overall ACC reference line)
    if (useOverallACC && crfSelf) {
      const xMin = crfSelf.map((b,i)=>getXVal(b,i)).reduce((a,v)=>Math.min(a,v), Infinity);
      const xMax = crfSelf.map((b,i)=>getXVal(b,i)).reduce((a,v)=>Math.max(a,v), -Infinity);
      datasets.push({
        label: 'Self overall ACC ref',
        data: [{x:xMin, y:overallACCSelf}, {x:xMax, y:overallACCSelf}],
        borderColor: withAlpha('#ff9800', 0.4), backgroundColor: 'transparent',
        pointRadius: 0, borderWidth: 1, borderDash: [2, 6], showLine: true,
        order: 4,
      });
    }
    if (useOverallACC && crfStranger) {
      const xMin = crfStranger.map((b,i)=>getXVal(b,i)).reduce((a,v)=>Math.min(a,v), Infinity);
      const xMax = crfStranger.map((b,i)=>getXVal(b,i)).reduce((a,v)=>Math.max(a,v), -Infinity);
      datasets.push({
        label: 'Stranger overall ACC ref',
        data: [{x:xMin, y:overallACCStranger}, {x:xMax, y:overallACCStranger}],
        borderColor: withAlpha('#2196f3', 0.4), backgroundColor: 'transparent',
        pointRadius: 0, borderWidth: 1, borderDash: [2, 6], showLine: true,
        order: 4,
      });
    }

    const ciBandPlugin = {
      id: 'crfCIBands',
      beforeDatasetsDraw(chart) {
        if (isDprime) return;  // No CI bands for d' mode
        const { ctx, chartArea, scales: { x, y } } = chart;
        const { left, top, right, bottom } = chartArea;
        ctx.save();
        ctx.beginPath();
        ctx.rect(left, top, right - left, bottom - top);
        ctx.clip();

        const clampY = (val) => Math.max(top, Math.min(bottom, val));
        const drawCIBand = (bins, color, overallACC) => {
          if (!bins || bins.length < 2 || useOverallACC) return;
          ctx.beginPath();
          ctx.fillStyle = color;
          ctx.globalAlpha = 0.3;
          const firstX = x.getPixelForValue(getXVal(bins[0], 0));
          ctx.moveTo(firstX, clampY(y.getPixelForValue(getYVal(bins[0], overallACC) + getYSEM(bins[0]) * 1.96)));
          for (let i = 1; i < bins.length; i++) {
            ctx.lineTo(x.getPixelForValue(getXVal(bins[i], i)), clampY(y.getPixelForValue(getYVal(bins[i], overallACC) + getYSEM(bins[i]) * 1.96)));
          }
          for (let i = bins.length - 1; i >= 0; i--) {
            ctx.lineTo(x.getPixelForValue(getXVal(bins[i], i)), clampY(y.getPixelForValue(getYVal(bins[i], overallACC) - getYSEM(bins[i]) * 1.96)));
          }
          ctx.closePath();
          ctx.fill();
        };
        if (crfSelf) drawCIBand(crfSelf, withAlpha('#ff9800', 0.12), overallACCSelf);
        if (crfStranger) drawCIBand(crfStranger, withAlpha('#2196f3', 0.12), overallACCStranger);

        ctx.globalAlpha = 0.55;
        ctx.lineWidth = 1.5;
        const drawErrorBars = (bins, color, overallACC) => {
          if (useOverallACC) return;
          bins.forEach((b, i) => {
            const px = x.getPixelForValue(getXVal(b, i));
            if (px < left || px > right) return;
            const yVal = getYVal(b, overallACC);
            const sem = getYSEM(b);
            const yUpper = clampY(y.getPixelForValue(yVal + sem * 1.96));
            const yLower = clampY(y.getPixelForValue(yVal - sem * 1.96));
            ctx.strokeStyle = color;
            ctx.beginPath();
            ctx.moveTo(px, yUpper);
            ctx.lineTo(px, yLower);
            ctx.stroke();
            ctx.beginPath();
            const capTop = Math.max(top, yUpper);
            const capBot = Math.min(bottom, yLower);
            ctx.moveTo(px - 3, capTop); ctx.lineTo(px + 3, capTop);
            ctx.moveTo(px - 3, capBot); ctx.lineTo(px + 3, capBot);
            ctx.stroke();
          });
        };
        if (crfSelf) drawErrorBars(crfSelf, '#ff9800', overallACCSelf);
        if (crfStranger) drawErrorBars(crfStranger, '#2196f3', overallACCStranger);

        ctx.restore();
      }
    };

    const yMax = isDprime ? undefined : 1.0;
    const yMin = isDprime ? undefined : 0;
    const yStep = isDprime ? undefined : 0.1;

    const baselinePlugin = {
      id: 'baseline05',
      afterDraw(chart) {
        if (isDprime) return;  // No baseline for d' mode
        const { ctx, chartArea: { left, right }, scales: { y } } = chart;
        const refVal = isACC ? 0.5 : 0.5;
        const yRef = y.getPixelForValue(refVal);
        if (yRef >= chart.chartArea.top && yRef <= chart.chartArea.bottom) {
          ctx.save();
          ctx.setLineDash([6, 4]);
          ctx.strokeStyle = textColor;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(left, yRef);
          ctx.lineTo(right, yRef);
          ctx.stroke();
          ctx.fillStyle = textColor;
          ctx.font = '10px sans-serif';
          ctx.fillText(isACC ? 'chance (0.5)' : 'chance', left + 4, yRef - 5);
          ctx.restore();
        }
      }
    };

    if (crfChartInst) { crfChartInst.destroy(); crfChartInst = null; }
    crfChartInst = new Chart(ctx, {
        type: 'scatter',
        data: { datasets },
        options: {
          responsive: true, maintainAspectRatio: false, showLine: true,
          animation: { duration: 300, easing: 'easeOutQuart' },
          plugins: {
            legend: { labels: { color: legendColor, usePointStyle: true, filter: item => !item.text.includes('trend') && !item.text.includes('ref') } },
            tooltip: {
              callbacks: {
                label: ctx => {
                  const d = ctx.dataset;
                  if (d.label.includes('trend') || d.label.includes('ref')) return '';
                  if (useBinIndex) {
                    return d.label + ': Bin=' + ctx.parsed.x.toFixed(0) + ', ' + (isDprime ? "d'="+ctx.parsed.y.toFixed(3) : (isACC ? 'ACC='+(ctx.parsed.y*100).toFixed(1)+'%' : 'P(Match)='+(ctx.parsed.y*100).toFixed(1)+'%'));
                  }
                  return d.label + ': ' + (_crfRTLog ? 'ln(RT)' : 'RT') + '=' + ctx.parsed.x.toFixed(2) + (_crfRTLog ? '' : 's') + ', ' + (isDprime ? "d'="+ctx.parsed.y.toFixed(3) : (isACC ? 'ACC='+(ctx.parsed.y*100).toFixed(1)+'%' : 'P(Match)='+(ctx.parsed.y*100).toFixed(1)+'%'));
                }
              }
            }
          },
          scales: {
            x: {
              type: 'linear', title: { display: true, text: xLabel, color: textColor },
              ticks: { color: textColor, stepSize: useBinIndex ? 1 : undefined },
              grid: { color: gridColor },
              min: useBinIndex ? 0.5 : undefined,
              max: useBinIndex ? nQ + 0.5 : undefined,
            },
            y: {
              title: { display: true, text: yLabel, color: textColor },
              min: yMin, max: yMax, ticks: { color: textColor, stepSize: yStep },
              grid: { color: gridColor }
            }
          }
        },
        plugins: [baselinePlugin, ciBandPlugin],
      });

    updateSPEChart(crfSelf, crfStranger);
    if (loadingEl) loadingEl.style.display = 'none';
  });
}

// === SPE图表 (增强版: 含零基线、置信区间带、趋势线) ===
// 参考 ggcube 的 CI surface 设计
function updateSPEChart(crfSelf, crfStranger) {
  const ctx = document.getElementById('speChart').getContext('2d');
  const textColor = appState.theme === 'light' ? '#5a6c7d' : '#90a4ae';
  const gridColor = appState.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)';
  const legendColor = appState.theme === 'light' ? '#2c3e50' : '#e0e0e0';

  if (!crfSelf || !crfStranger) {
    if (speChartInst) { speChartInst.destroy(); speChartInst = null; }
    speChartInst = new Chart(ctx, {
      type: 'scatter', data: { datasets: [] },
      options: { responsive: true, maintainAspectRatio: false }
    });
    return;
  }

  const isACC = _crfYMetric === 'acc';
  const useOverallACC = isACC && _crfACCMode === 'overall';
  const useBinIndex = _crfXAxisMode === 'binIndex';
  const overallACCSelf = _crfCache.overallACCSelf || 0;
  const overallACCStranger = _crfCache.overallACCStranger || 0;

  const speData = [];
  const speSems = [];
  const minLen = Math.min(crfSelf.length, crfStranger.length);
  const isDprimeSPE = _crfYMetric === 'dprime';
  for (let i = 0; i < minLen; i++) {
    const rtX = useBinIndex ? (i + 1) : (crfSelf[i].rtMean + crfStranger[i].rtMean) / 2;
    let speY;
    let sem;
    if (isDprimeSPE) {
      speY = crfSelf[i].dprime - crfStranger[i].dprime;
      sem = 0;
    } else if (useOverallACC) {
      speY = overallACCSelf - overallACCStranger;
      sem = 0;
    } else if (isACC) {
      speY = crfSelf[i].binACC - crfStranger[i].binACC;
      sem = Math.sqrt(crfSelf[i].binACCSem * crfSelf[i].binACCSem + crfStranger[i].binACCSem * crfStranger[i].binACCSem);
    } else {
      speY = crfSelf[i].upperProp - crfStranger[i].upperProp;
      sem = Math.sqrt(crfSelf[i].sem * crfSelf[i].sem + crfStranger[i].sem * crfStranger[i].sem);
    }
    speData.push({ x: rtX, y: speY });
    speSems.push(sem);
  }

  const speLabel = isDprimeSPE ? "SPE = d'_Self − d'_Stranger" : (isACC ? 'SPE = ACC_Self - ACC_Stranger' : 'SPE = P_Self - P_Stranger');
  const xLabelSPE = useBinIndex ? '分箱序号 (Bin Index)' : (_crfRTLog ? 'ln(RT)' : 'RT均值 (秒)');

  const speXs = speData.map(d => d.x);
  const speYs = speData.map(d => d.y);
  const speFit = polyFit(speXs, speYs, 2);
  const datasets = [
    {
      label: speLabel,
      data: speData,
      borderColor: '#ce93d8', backgroundColor: '#ce93d8',
      pointRadius: 7, pointHoverRadius: 10, borderWidth: 2.5, tension: 0.1,
      order: 1,
    },
  ];
  if (speFit) {
    const fitPoints = [];
    const xMin = speXs[0], xMax = speXs[speXs.length - 1];
    const xRange = xMax - xMin || 0.001;
    for (let i = 0; i <= 60; i++) {
      const x = xMin + (xRange * i / 60);
      fitPoints.push({ x, y: predictPoly(speFit, x) });
    }
    datasets.unshift({
      label: 'SPE trend',
      data: fitPoints,
      borderColor: withAlpha('#ce93d8', 0.45),
      backgroundColor: 'transparent',
      pointRadius: 0, borderWidth: 1.5, borderDash: [5, 3], tension: 0, showLine: true,
      order: 3,
    });
  }

  const speBaselinePlugin = {
    id: 'speBaseline',
    beforeDatasetsDraw(chart) {
      const { ctx, chartArea: { left, right }, scales: { y } } = chart;
      const y0 = y.getPixelForValue(0);
      if (y0 >= chart.chartArea.top && y0 <= chart.chartArea.bottom) {
        ctx.save();
        ctx.setLineDash([8, 4]);
        ctx.strokeStyle = textColor;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(left, y0);
        ctx.lineTo(right, y0);
        ctx.restore();
      }

      if (speSems.length >= 2 && !useOverallACC) {
        ctx.save();
        ctx.globalAlpha = 0.25;
        const { x: scaleX } = chart.scales;
        ctx.beginPath();
        ctx.fillStyle = '#ce93d8';
        const firstX = scaleX.getPixelForValue(speData[0].x);
        ctx.moveTo(firstX, y.getPixelForValue(speData[0].y + speSems[0] * 1.96));
        for (let i = 1; i < speData.length; i++) {
          ctx.lineTo(scaleX.getPixelForValue(speData[i].x), y.getPixelForValue(speData[i].y + speSems[i] * 1.96));
        }
        for (let i = speData.length - 1; i >= 0; i--) {
          ctx.lineTo(scaleX.getPixelForValue(speData[i].x), y.getPixelForValue(speData[i].y - speSems[i] * 1.96));
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();

        ctx.save();
        ctx.globalAlpha = 0.5;
        ctx.strokeStyle = '#ce93d8';
        ctx.lineWidth = 1.5;
        speData.forEach((d, i) => {
          const px = scaleX.getPixelForValue(d.x);
          const yUpper = y.getPixelForValue(d.y + speSems[i] * 1.96);
          const yLower = y.getPixelForValue(d.y - speSems[i] * 1.96);
          ctx.beginPath();
          ctx.moveTo(px, yUpper);
          ctx.lineTo(px, yLower);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(px - 3, yUpper); ctx.lineTo(px + 3, yUpper);
          ctx.moveTo(px - 3, yLower); ctx.lineTo(px + 3, yLower);
          ctx.stroke();
        });
        ctx.restore();
      }
    }
  };

  if (speChartInst) { speChartInst.destroy(); speChartInst = null; }
  speChartInst = new Chart(ctx, {
      type: 'scatter',
      data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: false, showLine: true,
        animation: { duration: 300, easing: 'easeOutQuart' },
        plugins: {
          legend: { labels: { color: legendColor, usePointStyle: true, filter: item => !item.text.includes('trend') } },
          tooltip: {
            callbacks: {
              label: ctx => {
                const d = ctx.dataset;
                if (d.label.includes('trend')) return '';
                const metricName = isDprimeSPE ? "Δd'" : (isACC ? 'ΔACC' : 'ΔP(Match)');
                const rtx = useBinIndex ? ('Bin='+ctx.parsed.x.toFixed(0)) : ((_crfRTLog ? 'ln(RT)=' : 'RT=')+ctx.parsed.x.toFixed(2)+(_crfRTLog ? '' : 's'));
                const metVal = isDprimeSPE ? (metricName+'='+ctx.parsed.y.toFixed(3)) : (metricName+'='+(ctx.parsed.y*100).toFixed(1)+'%');
                return 'SPE: ' + rtx + ', ' + metVal;
              }
            }
          }
        },
        scales: {
          x: {
            title: { display: true, text: xLabelSPE, color: textColor },
            ticks: { color: textColor, stepSize: useBinIndex ? 1 : undefined },
            grid: { color: gridColor },
            min: useBinIndex ? 0.5 : undefined,
            max: useBinIndex ? minLen + 0.5 : undefined,
          },
          y: {
            title: { display: true, text: speLabel, color: textColor },
            ticks: { color: textColor },
            grid: { color: gridColor }
          }
        }
      },
      plugins: [speBaselinePlugin],
    });
}

// === 聚合数据加载 (带状态指示) ===
async function loadAggregatedData() {
  const infoEl = document.getElementById('crfDataInfo');
  infoEl.innerHTML = '<span style="color:#ff9800;">⏳ 加载聚合数据中...</span>';
  const groups = Array.from(appState.selectedGroups).join(',');
  try {
    appState.allData = await fetchAPI(`/api/data/all?group=${groups}`);
    appState.currentData = null;
    const totalTrials = appState.allData.trials.length;
    const totalFiles = appState.allData.summary.length;
    infoEl.textContent = `已加载: ${totalFiles}个文件, ${totalTrials}试次 (G${groups})`;
    updateCRFChart();
  } catch(e) {
    infoEl.innerHTML = '<span style="color:#f44336;">加载失败，请重试</span>';
  }
}

function updateCRFGroupTabStyles() {
  document.querySelectorAll('#crfGroupTabs .group-tab').forEach(b => {
    const g = b.dataset.g;
    if (g === 'all') {
      b.style.background = appState.selectedGroups.size === 8 ? 'var(--accent)' : '';

      // 清空按钮保持默认样式
    } else {
      b.classList.toggle('selected', appState.selectedGroups.has(parseInt(g)));
    }
  });
}

  const steps = [
    {
      title: '定义实验参数 & 按键映射规则',
      color: '#4caf50',
      lang: 'Python (app_server.py)',
      code: `# 8组实验条件 (P/T/W参数)
CONDITIONS = {
    1: {"P": 0, "T": 0.03, "W": 0.3, "label": "G1"},
    2: {"P": 0, "T": 0.03, "W": 0.6, "label": "G2"},
    3: {"P": 120, "T": 0.03, "W": 0.6, "label": "G3"},
    4: {"P": 120, "T": 0.08, "W": 0.6, "label": "G4"},
    5: {"P": 8, "T": 0.1, "W": 1.1, "label": "G5"},
    6: {"P": 120, "T": 0.5, "W": 1.5, "label": "G6"},
    7: {"P": 120, "T": 0.03, "W": 0.8, "label": "G7"},

function adjustCrfOvZoom(delta) {
  const canvas = document.getElementById('crfOverviewCanvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const cx = rect.width / 2, cy = rect.height / 2;
  const newZoom = Math.max(0.5, Math.min(2.0, _crfOvView.targetZoom + delta));
  const scale = newZoom / _crfOvView.targetZoom;
  _crfOvView.targetOffsetX = cx - scale * (cx - _crfOvView.targetOffsetX);
  _crfOvView.targetOffsetY = cy - scale * (cy - _crfOvView.targetOffsetY);
  _crfOvView.targetZoom = newZoom;
  updateCrfOvZoomUI();
  scheduleCrfOvRender();
}

function resetCrfOvView() {
  _crfOvView.targetZoom = 1;
  _crfOvView.targetOffsetX = 0;
  _crfOvView.targetOffsetY = 0;
  updateCrfOvZoomUI();

function updateCrfOvZoomUI() {

  if (slider) slider.value = Math.round(_crfOvView.targetZoom * 100);

function scheduleCrfOvRender() {
  if (_crfOvAnimFrame) cancelAnimationFrame(_crfOvAnimFrame);
  const animate = () => {
    const lerp = 0.25;
    const dz = _crfOvView.targetZoom - _crfOvView.zoom;
    const dx = _crfOvView.targetOffsetX - _crfOvView.offsetX;
    const dy = _crfOvView.targetOffsetY - _crfOvView.offsetY;
    if (Math.abs(dz) < 0.001 && Math.abs(dx) < 0.1 && Math.abs(dy) < 0.1) {
      _crfOvView.zoom = _crfOvView.targetZoom;
      _crfOvView.offsetX = _crfOvView.targetOffsetX;
      _crfOvView.offsetY = _crfOvView.targetOffsetY;
      _crfOvAnimFrame = null;
      renderCRFOverview();
      return;
    }
    _crfOvView.zoom += dz * lerp;
    _crfOvView.offsetX += dx * lerp;
    _crfOvView.offsetY += dy * lerp;
    renderCRFOverview();
    _crfOvAnimFrame = requestAnimationFrame(animate);
  };
  _crfOvAnimFrame = requestAnimationFrame(animate);
}

function renderCRFOverview() {
  if (!_crfOvData) return;
  const canvas = document.getElementById('crfOverviewCanvas');
  if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const cssW = rect.width;
  const cssH = Math.max(280, rect.width * 0.55);
  canvas.width = cssW * dpr;
  canvas.height = cssH * dpr;
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = cssW, H = cssH;

  const bg = appState.theme === 'light' ? '#fafbfc' : '#0a1628';
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  const zoom = _crfOvView.zoom;
  const ox = _crfOvView.offsetX;
  const oy = _crfOvView.offsetY;

  ctx.save();
  ctx.translate(ox, oy);
  ctx.scale(zoom, zoom);

  const margin = { l: 56, r: 18, t: 18, b: 48 };
  const pw = W - margin.l - margin.r, ph = H - margin.t - margin.b;

  const txtC = appState.theme === 'light' ? '#4a5a6a' : '#b0bec5';
  const gridC = appState.theme === 'light' ? 'rgba(0,0,0,0.07)' : 'rgba(255,255,255,0.06)';
  const axisC = appState.theme === 'light' ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.1)';

  const isDprimeOv = _crfOvData.isDprime || false;
  const isACC = _crfYMetric === 'acc';
  const useOverallACC = isACC && _crfACCMode === 'overall';
  const useBinIndexOv = _crfXAxisMode === 'binIndex';
  const showSelf = _crfOvShowSelf;
  const showStranger = _crfOvShowStranger;

  const getOvY = (b, overallACC) => {
    if (isDprimeOv) return b.dprime;
    if (useOverallACC) return overallACC;
    if (isACC) return b.binACC;
    return b.upperProp;
  };
  const getOvX = (b, idx) => useBinIndexOv ? (idx + 1) : b.rtMean;

  const yTitle = isDprimeOv ? "d' (辨别力指数)" : (isACC ? (useOverallACC ? 'ACC (overall)' : 'ACC (bin)') : 'P(Match Key)');
  const xTitleOv = useBinIndexOv ? 'Bin Index' : (_crfRTLog ? 'ln(RT)' : 'RT bin mean (s)');

  // Plot area background
  ctx.fillStyle = appState.theme === 'light' ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.02)';
  ctx.fillRect(margin.l, margin.t, pw, ph);

  // Plot area border
  ctx.strokeStyle = axisC; ctx.lineWidth = 1;
  ctx.strokeRect(margin.l, margin.t, pw, ph);

  // Horizontal grid lines
  let yMin = 0, yMax = 1, yStep = 0.25;
  if (isDprimeOv) {
    // Auto-compute d' range from data
    let dMin = Infinity, dMax = -Infinity;
    for (let gid = 1; gid <= 8; gid++) {
      if (!_crfOvVisible.has(gid)) continue;
      const gd = _crfOvData.aggByGroup[gid];
      [gd.selfCRF, gd.strangerCRF].forEach(crf => {
        if (!crf) return;
        crf.forEach(b => { const v = b.dprime; if (isFinite(v)) { dMin = Math.min(dMin, v); dMax = Math.max(dMax, v); } });
      });
    }
    if (!isFinite(dMin)) { dMin = 0; dMax = 4; }
    const pad = Math.max(0.2, (dMax - dMin) * 0.1);
    yMin = Math.floor((dMin - pad) * 2) / 2;
    yMax = Math.ceil((dMax + pad) * 2) / 2;
    yStep = Math.max(0.5, Math.round((yMax - yMin) / 6 * 2) / 2);
  }
  const yRange = yMax - yMin || 1;
  ctx.strokeStyle = gridC; ctx.lineWidth = 0.6;
  for (let yv = yMin; yv <= yMax + 0.001; yv += yStep) {
    const py = margin.t + ph * (1 - (yv - yMin) / yRange);
    ctx.beginPath(); ctx.moveTo(margin.l, py); ctx.lineTo(margin.l + pw, py); ctx.stroke();
  }

  // Y-axis labels
  ctx.fillStyle = txtC; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'right';
  for (let yv = yMin; yv <= yMax + 0.001; yv += yStep) {
    const py = margin.t + ph * (1 - (yv - yMin) / yRange);
    const label = isDprimeOv ? yv.toFixed(1) : yv.toFixed(2);
    ctx.fillText(label, margin.l - 6, py + 4);
  }

  // Y-axis title
  ctx.save();
  ctx.translate(10, margin.t + ph/2);
  ctx.rotate(-Math.PI/2);
  ctx.fillStyle = txtC; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(yTitle, 0, 0);
  ctx.restore();

  // X-axis title
  ctx.fillStyle = txtC; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(xTitleOv, margin.l + pw/2, H - 8);

  // Compute X range
  let xRange;
  if (useBinIndexOv) {
    xRange = [0.5, _crfOvQ + 0.5];
  } else {
    let rtMin = Infinity, rtMax = -Infinity;
    for (let gid = 1; gid <= 8; gid++) {
      if (!_crfOvVisible.has(gid)) continue;
      if (_crfOvLevel === 'group') {
        const gd = _crfOvData.aggByGroup[gid];
        [gd.selfCRF, gd.strangerCRF].forEach(crf => {
          if (!crf) return;
          crf.forEach(b => { rtMin = Math.min(rtMin, b.rtMean); rtMax = Math.max(rtMax, b.rtMean); });
        });
      } else {
        const subs = _crfOvData.subjMap[gid];
        if (!subs) continue;
        subs.forEach(s => {
          [s.selfCRF, s.strangerCRF].forEach(crf => {
            if (!crf) return;
            crf.forEach(b => { rtMin = Math.min(rtMin, b.rtMean); rtMax = Math.max(rtMax, b.rtMean); });
          });
        });
      }
    }
    if (!isFinite(rtMin)) { rtMin = 0.2; rtMax = 1.8; }
    const pad = Math.max(0.03, (rtMax - rtMin) * 0.08);
    xRange = [rtMin - pad, rtMax + pad];
  }

  const xToPx = (x) => margin.l + ((x - xRange[0]) / (xRange[1] - xRange[0])) * pw;
  const yToPx = (y) => margin.t + ph * (1 - Math.max(0, Math.min(1, (y - yMin) / yRange)));

  // X-axis tick labels
  ctx.fillStyle = txtC; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  if (useBinIndexOv) {
    for (let i = 1; i <= _crfOvQ; i++) {
      const px = xToPx(i);
      ctx.fillText(i.toString(), px, margin.t + ph + 16);
      ctx.beginPath(); ctx.moveTo(px, margin.t + ph); ctx.lineTo(px, margin.t + ph + 4);
      ctx.strokeStyle = axisC; ctx.stroke();
    }
  } else {
    const xTickCount = 5;
    for (let i = 0; i <= xTickCount; i++) {
      const val = xRange[0] + (xRange[1] - xRange[0]) * i / xTickCount;
      const px = margin.l + pw * i / xTickCount;
      ctx.fillText(val.toFixed(2), px, margin.t + ph + 16);
      ctx.beginPath(); ctx.moveTo(px, margin.t + ph); ctx.lineTo(px, margin.t + ph + 4);
      ctx.strokeStyle = axisC; ctx.stroke();
    }
  }

  const drawFillBand = (selfCRF, strangerCRF, color, alpha, selfOverall, strangerOverall) => {
    if (!selfCRF || !strangerCRF || selfCRF.length < 2 || strangerCRF.length < 2) return;
    if (!showSelf || !showStranger) return;
    ctx.beginPath();
    const sx0 = xToPx(getOvX(selfCRF[0], 0));
    const sy0 = yToPx(getOvY(selfCRF[0], selfOverall));
    ctx.moveTo(sx0, sy0);
    for (let i = 1; i < selfCRF.length; i++) {
      ctx.lineTo(xToPx(getOvX(selfCRF[i], i)), yToPx(getOvY(selfCRF[i], selfOverall)));
    }
    for (let i = strangerCRF.length - 1; i >= 0; i--) {
      ctx.lineTo(xToPx(getOvX(strangerCRF[i], i)), yToPx(getOvY(strangerCRF[i], strangerOverall)));
    }
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = alpha;
    ctx.fill();
    ctx.globalAlpha = 1;
  };

  const drawCRFLine = (crf, color, dashed, alpha, lineWidth, overallACC) => {
    if (!crf || crf.length < 2) return;
    ctx.beginPath();
    const px0 = xToPx(getOvX(crf[0], 0));
    const py0 = yToPx(getOvY(crf[0], overallACC));
    ctx.moveTo(px0, py0);
    for (let i = 1; i < crf.length; i++) {
      ctx.lineTo(xToPx(getOvX(crf[i], i)), yToPx(getOvY(crf[i], overallACC)));
    }
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = lineWidth || 2;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    if (dashed) ctx.setLineDash([6, 3]); else ctx.setLineDash([]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    crf.forEach((b, i) => {
      const px = xToPx(getOvX(b, i));
      const py = yToPx(getOvY(b, overallACC));
      ctx.fillStyle = color; ctx.globalAlpha = alpha;
      ctx.beginPath();
      if (dashed) {
        ctx.beginPath(); ctx.moveTo(px - 3, py - 3); ctx.lineTo(px + 3, py + 3);
        ctx.moveTo(px + 3, py - 3); ctx.lineTo(px - 3, py + 3);
        ctx.strokeStyle = color; ctx.lineWidth = 1.5; ctx.stroke();
      } else {
        ctx.arc(px, py, 3.5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    });
  };

  const drawCRFGlow = (crf, color, alpha, overallACC) => {
    if (!crf || crf.length < 2) return;
    ctx.beginPath();
    const px0 = xToPx(getOvX(crf[0], 0));
    const py0 = yToPx(getOvY(crf[0], overallACC));
    ctx.moveTo(px0, py0);
    for (let i = 1; i < crf.length; i++) {
      ctx.lineTo(xToPx(getOvX(crf[i], i)), yToPx(getOvY(crf[i], overallACC)));
    }
    ctx.strokeStyle = color;
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    ctx.stroke();
    ctx.globalAlpha = 1;
  };

  for (let gid = 1; gid <= 8; gid++) {
    if (!_crfOvVisible.has(gid)) continue;
    const color = CRF_OV_COLORS[gid - 1];

    if (_crfOvLevel === 'group') {
      const gd = _crfOvData.aggByGroup[gid];
      const selfOACC = gd.selfOverallACC || 0;
      const strangerOACC = gd.strangerOverallACC || 0;

      if (_crfOvSplitCondition && _crfOvData.splitByGroup) {
        // 四条件模式: Self/Stranger × Matching/NonMatching
        const sp = _crfOvData.splitByGroup[gid];
        if (!sp) continue;
        // Self + Matching: 粗实线, 圆点
        if (showSelf && sp.selfMatchCRF) drawCRFLine(sp.selfMatchCRF, color, false, 0.92, 2.8, sp.selfMatchOACC);
        // Self + NonMatching: 细实线, 空心圆
        if (showSelf && sp.selfNonmatchCRF) {
          drawCRFLine(sp.selfNonmatchCRF, withAlpha(color, 0.55), false, 0.7, 1.3, sp.selfNonmatchOACC);
        }
        // Stranger + Matching: 粗虚线, X号
        if (showStranger && sp.strangerMatchCRF) drawCRFLine(sp.strangerMatchCRF, color, true, 0.65, 1.8, sp.strangerMatchOACC);
        // Stranger + NonMatching: 细点线, 小X
        if (showStranger && sp.strangerNonmatchCRF) {
          drawCRFLine(sp.strangerNonmatchCRF, withAlpha(color, 0.4), true, 0.75, 1.0, sp.strangerNonmatchOACC);
        }
      } else {
        // 原始模式: Self / Stranger
        drawFillBand(gd.selfCRF, gd.strangerCRF, color, 0.08, selfOACC, strangerOACC);
        if (showSelf) { drawCRFGlow(gd.selfCRF, color, 0.15, selfOACC); drawCRFLine(gd.selfCRF, color, false, 0.9, 2.5, selfOACC); }
        if (showStranger) { drawCRFLine(gd.strangerCRF, color, true, 0.6, 1.6, strangerOACC); }
      }
    } else {
      const subs = _crfOvData.subjMap[gid];
      if (!subs) continue;
      const n = subs.length;
      subs.forEach((s, idx) => {
        const alpha = 0.15 + (idx / n) * 0.3;
        const selfOACC = s.selfOverallACC || 0;
        const strangerOACC = s.strangerOverallACC || 0;
        if (showSelf) drawCRFLine(s.selfCRF, color, false, alpha, 1.2, selfOACC);
        if (showStranger) drawCRFLine(s.strangerCRF, color, true, alpha * 0.5, 0.8, strangerOACC);
      });
    }
  }

  ctx.restore();

  // Bottom group toggle bar
  const segW = Math.min(44, (W - margin.l - margin.r) / 8);
  const barX = (W - segW * 8) / 2;
  const barY = H - 22;
  ctx.fillStyle = appState.theme === 'light' ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.03)';
  ctx.fillRect(barX - 4, barY - 2, segW * 8 + 8, 18);
  ctx.strokeStyle = appState.theme === 'light' ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(barX - 4, barY - 2, segW * 8 + 8, 18);

  for (let gid = 1; gid <= 8; gid++) {
    const x = barX + (gid - 1) * segW;
    const visible = _crfOvVisible.has(gid);
    ctx.fillStyle = visible ? CRF_OV_COLORS[gid - 1] : 'rgba(128,128,128,0.25)';
    ctx.fillRect(x + 2, barY, segW - 4, 14);
    ctx.fillStyle = visible ? '#fff' : '#999';
    ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('G' + gid, x + segW/2, barY + 11);
  }

  buildCrfOvLegend();
}

function buildCrfOvLegend() {
  const el = document.getElementById('crfOverviewLegend');
  if (!el) return;
  if (!_crfOvData) { el.innerHTML = '<div style="padding:8px;text-align:center;color:var(--text-secondary);width:100%;">请先加载数据</div>'; return; }
  let html = '<div style="font-weight:700;color:var(--accent);font-size:0.9em;white-space:nowrap;">图例 (点击切换):</div>';
  for (let gid = 1; gid <= 8; gid++) {
    const visible = _crfOvVisible.has(gid);
    const c = visible ? CRF_OV_COLORS[gid - 1] : 'rgba(128,128,128,0.3)';
    const opacity = visible ? '1' : '0.4';
    html += `<div style="display:flex;align-items:center;gap:3px;cursor:pointer;opacity:${opacity};padding:1px 4px;border-radius:3px;border:1px solid transparent;" data-ov-g="${gid}">
      <span style="display:inline-block;width:10px;height:8px;border-radius:50%;background:${c};opacity:0.9;"></span>
      <span style="font-size:0.9em;font-weight:600;">G${gid}</span></div>`;
  }
  html += '<div style="width:1px;height:16px;background:var(--border);margin:0 4px;"></div>';
  html += '<label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:0.85em;white-space:nowrap;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:' + (_crfOvShowSelf ? 'rgba(255,152,0,0.12)' : 'transparent') + ';" id="crfOvToggleSelf">';
  html += '<input type="checkbox" id="crfOvCheckSelf" ' + (_crfOvShowSelf ? 'checked' : '') + ' style="accent-color:#ff9800;">';
  html += '<span style="font-weight:600;color:#ff9800;">● Self</span></label>';
  html += '<label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:0.85em;white-space:nowrap;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:' + (_crfOvShowStranger ? 'rgba(33,150,243,0.12)' : 'transparent') + ';" id="crfOvToggleStranger">';
  html += '<input type="checkbox" id="crfOvCheckStranger" ' + (_crfOvShowStranger ? 'checked' : '') + ' style="accent-color:#2196f3;">';
  html += '<span style="font-weight:600;color:#2196f3;">✕ Stranger</span></label>';
  html += '<div style="width:1px;height:16px;background:var(--border);margin:0 4px;"></div>';
  html += '<span style="font-size:0.82em;color:var(--text-secondary);white-space:nowrap;">条件:</span>';
  html += `<label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:0.85em;white-space:nowrap;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:${_crfOvCondition==='all'?'rgba(100,181,246,0.1)':'transparent'};" id="crfOvToggleCondAll">`;
  html += '<input type="radio" name="crfOvCond" value="all" ' + (_crfOvCondition === 'all' ? 'checked' : '') + ' style="accent-color:var(--accent);">';
  html += '<span>全部</span></label>';
  html += `<label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:0.85em;white-space:nowrap;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:${_crfOvCondition==='Matching'?'rgba(76,175,80,0.12)':'transparent'};" id="crfOvToggleCondMatch">`;
  html += '<input type="radio" name="crfOvCond" value="Matching" ' + (_crfOvCondition === 'Matching' ? 'checked' : '') + ' style="accent-color:#4caf50;">';
  html += '<span style="color:#4caf50;font-weight:500;">Matching</span></label>';
  html += `<label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:0.85em;white-space:nowrap;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:${_crfOvCondition==='NonMatching'?'rgba(244,67,54,0.12)':'transparent'};" id="crfOvToggleCondNonmatch">`;
  html += '<input type="radio" name="crfOvCond" value="NonMatching" ' + (_crfOvCondition === 'NonMatching' ? 'checked' : '') + ' style="accent-color:#f44336;">';
  html += '<span style="color:#f44336;font-weight:500;">NonMatching</span></label>';
  html += '<div style="width:1px;height:16px;background:var(--border);margin:0 4px;"></div>';
  html += '<label style="display:flex;align-items:center;gap:3px;cursor:pointer;font-size:0.82em;white-space:nowrap;padding:2px 6px;border-radius:3px;border:1px solid var(--border);background:' + (_crfOvSplitCondition ? 'rgba(156,39,176,0.1)' : 'transparent') + ';" id="crfOvToggleSplit">';
  html += '<input type="checkbox" id="crfOvCheckSplit" ' + (_crfOvSplitCondition ? 'checked' : '') + ' style="accent-color:#9c27b0;">';
  html += '<span style="font-weight:500;color:#9c27b0;">⚡ 四条件 (2×2)</span></label>';
  html += '<span style="font-size:0.78em;color:var(--text-secondary);margin-left:auto;">' + (_crfOvSplitCondition ? '粗=Match 细=Nonmatch' : '浅色填充 = Self−Stranger 差异区域') + '</span>';
  el.innerHTML = html;

  el.querySelectorAll('[data-ov-g]').forEach(div => {
    div.addEventListener('click', () => {
      const gid = parseInt(div.dataset.ovG);
      if (_crfOvVisible.has(gid)) _crfOvVisible.delete(gid);
      else _crfOvVisible.add(gid);
      renderCRFOverview();
    });
    div.addEventListener('mouseenter', () => { div.style.borderColor = 'var(--accent)'; });
    div.addEventListener('mouseleave', () => { div.style.borderColor = 'transparent'; });
  });

  const selfCheck = document.getElementById('crfOvCheckSelf');
  if (selfCheck) selfCheck.addEventListener('change', () => {
    _crfOvShowSelf = selfCheck.checked;
    renderCRFOverview();
  });
  const strangerCheck = document.getElementById('crfOvCheckStranger');
  if (strangerCheck) strangerCheck.addEventListener('change', () => {
    _crfOvShowStranger = strangerCheck.checked;
    renderCRFOverview();
  });

  // Condition radio buttons (in legend)
  el.querySelectorAll('input[name="crfOvCond"]').forEach(radio => {
    radio.addEventListener('change', () => {
      if (radio.checked) {
        _crfOvCondition = radio.value;
        _crfOvData = null;
        loadCRFOverviewData();
      }
    });
  });
  // 4-condition split toggle
  const splitCheck = document.getElementById('crfOvCheckSplit');
  if (splitCheck) splitCheck.addEventListener('change', () => {
    _crfOvSplitCondition = splitCheck.checked;
    renderCRFOverview();
  });
}

function updateCrfOvTooltip(e) {
  // Tooltip for CRF overview - show RT and P(Match) at cursor position
  if (!_crfOvData) return;
}

function getDesignGroupSummary() {
  if (!appState.allData) return [];
  const summary = appState.allData.summary;
  const qualityMap = {1:'exclude',2:'exclude',3:'caution',4:'good',5:'good',6:'good',7:'good',8:'good'};
  const designMap = {1:{P:0,T:30,W:300},2:{P:0,T:30,W:600},3:{P:120,T:30,W:600},4:{P:120,T:80,W:600},
    5:{P:8,T:100,W:1100},6:{P:120,T:500,W:1500},7:{P:0,T:100,W:1100},8:{P:120,T:30,W:800}};
  const groups = {};
  summary.forEach(s => {
    const gid = s.groupID;
    if (!groups[gid]) {
      const d = designMap[gid];
      groups[gid] = { groupID: gid, P: d.P, T: d.T, W: d.W, quality: qualityMap[gid],
        totalTrials: 0, totalFormal: 0, totalResponses: 0, totalCorrect: 0, nSubjects: 0, rtSum: 0, rtCount: 0 };
    }
    groups[gid].totalTrials += s.total;
    groups[gid].totalFormal += s.formal;
    groups[gid].totalResponses += s.responses;
    groups[gid].totalCorrect += s.correct;
    groups[gid].nSubjects++;
  });
  if (appState.allData.trials) {
    appState.allData.trials.forEach(t => {
      if (t.stage === 'formal' && t.RT && groups[t.groupID]) {
        groups[t.groupID].rtSum += t.RT;
        groups[t.groupID].rtCount++;
      }
    });
  }
  return Object.values(groups).map(g => ({
    ...g,
    omissionRate: g.totalFormal > 0 ? ((g.totalFormal - g.totalResponses) / g.totalFormal * 100) : 0,
    accuracy: g.totalResponses > 0 ? (g.totalCorrect / g.totalResponses * 100) : 0,
    meanRT: g.rtCount > 0 ? (g.rtSum / g.rtCount) : 0,
  }));
}

// ===== SPE by Group: 计算各组 Self vs Stranger 效应量 =====
function computeSpeByGroup() {
  if (!appState.allData || !appState.allData.trials) return [];
  const formal = appState.allData.trials.filter(t => t.RT !== null && t.stage === 'formal');
  const results = [];
  for (let gid = 1; gid <= 8; gid++) {
    const gTrials = formal.filter(t => t.groupID === gid);
    const selfR = gTrials.filter(t => t.Identity === 'Self').map(t => t.RT);
    const strangerR = gTrials.filter(t => t.Identity === 'Stranger').map(t => t.RT);
    const selfAcc = gTrials.filter(t => t.Identity === 'Self' && t.Correct === 1).length;
    const selfTotal = gTrials.filter(t => t.Identity === 'Self').length;
    const strangerAcc = gTrials.filter(t => t.Identity === 'Stranger' && t.Correct === 1).length;
    const strangerTotal = gTrials.filter(t => t.Identity === 'Stranger').length;
    const selfMatch = gTrials.filter(t => t.Identity === 'Self' && t.ResponseIsMatch).length;
    const strangerMatch = gTrials.filter(t => t.Identity === 'Stranger' && t.ResponseIsMatch).length;

    // Cohen's d for RT: Stranger − Self, 正值=Self更快 (经典SPE方向)
    const dRT = cohensD(strangerR, selfR);
    // Cohen's d for ACC: Self − Stranger, 正值=Self更准确
    const dACC = cohensDProportion(
      selfAcc / Math.max(1, selfTotal), selfTotal,
      strangerAcc / Math.max(1, strangerTotal), strangerTotal
    );
    // P(Match) difference
    const pMatchDiff = (selfMatch / Math.max(1, selfTotal)) - (strangerMatch / Math.max(1, strangerTotal));

    results.push({
      groupID: gid,
      nSelf: selfTotal, nStranger: strangerTotal,
      selfMeanRT: selfR.length > 0 ? selfR.reduce((a,b)=>a+b,0)/selfR.length : 0,
      strangerMeanRT: strangerR.length > 0 ? strangerR.reduce((a,b)=>a+b,0)/strangerR.length : 0,
      speRTd: dRT,
      speACCd: dACC,
      spePMatch: pMatchDiff,
      selfACC: selfTotal > 0 ? selfAcc / selfTotal : 0,
      strangerACC: strangerTotal > 0 ? strangerAcc / strangerTotal : 0,
      selfPMatch: selfTotal > 0 ? selfMatch / selfTotal : 0,
      strangerPMatch: strangerTotal > 0 ? strangerMatch / strangerTotal : 0,
    });
  }
  return results;
}

function cohensD(a, b) {
  if (a.length < 2 || b.length < 2) return null;
  const ma = a.reduce((s,v)=>s+v,0)/a.length;
  const mb = b.reduce((s,v)=>s+v,0)/b.length;
  const va = a.reduce((s,v)=>s+(v-ma)**2,0)/(a.length-1);
  const vb = b.reduce((s,v)=>s+(v-mb)**2,0)/(b.length-1);
  const sp = Math.sqrt(((a.length-1)*va + (b.length-1)*vb) / (a.length+b.length-2));
  if (sp === 0) return 0;
  return (ma - mb) / sp;
}

function cohensDProportion(p1, n1, p2, n2) {
  if (n1 < 2 || n2 < 2) return null;
  const sp = Math.sqrt(p1*(1-p1)/n1 + p2*(1-p2)/n2);
  if (sp === 0) return 0;
  return (p1 - p2) / sp;
}

function getFilteredDesignGroups() {
  const summary = getDesignGroupSummary();
  const showGood = document.getElementById('designQualityGood')?.checked ?? true;
  const showCaution = document.getElementById('designQualityCaution')?.checked ?? true;
  const showExclude = document.getElementById('designQualityExclude')?.checked ?? true;
  return summary.filter(g => {
    if (g.quality === 'good' && !showGood) return false;
    if (g.quality === 'caution' && !showCaution) return false;
    if (g.quality === 'exclude' && !showExclude) return false;
    return true;
  });
}

// ===== Design Bubble Chart (增强版: T×W 设计空间 + HSL 颜色混合 + 边际rug投影) =====
// 气泡大小 ∝ P, 位置 = (T, W), 颜色 = 数据质量 (HSL 混合)
// ggcube ref_points: 边际rug沿T轴和W轴投影
let designBubbleInst = null;
function renderDesignBubbleChart(groups) {
  const canvas = document.getElementById('designBubbleChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  if (designBubbleInst) designBubbleInst.destroy();

  // ggcube 风格: HSL 亮度调整让颜色更丰富
  const baseColors = {good:'#4caf50', caution:'#ff9800', exclude:'#f44336'};

  const textColor = appState.theme === 'light' ? '#5a6c7d' : '#90a4ae';
  const gridColor = appState.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)';
  const legendColor = appState.theme === 'light' ? '#2c3e50' : '#e0e0e0';

  // ggcube 风格边际rug插件: 沿T/W轴投影点
  const rugPlugin = {
    id: 'designRug',
    afterDatasetsDraw(chart) {
      const { ctx, chartArea: { left, right, top, bottom }, scales: { x, y } } = chart;
      ctx.save();
      groups.forEach(g => {
        const px = x.getPixelForValue(g.T);
        const py = y.getPixelForValue(g.W);
        const color = baseColors[g.quality];
        ctx.fillStyle = withAlpha(color, 0.5);
        // 底部 T 轴 rug
        ctx.fillRect(px - 2, bottom - 1, 4, 8);
        // 左侧 W 轴 rug
        ctx.fillRect(left - 1, py - 2, 8, 4);
      });
      ctx.restore();
    }
  };

  designBubbleInst = new Chart(ctx, {
    type: 'bubble',
    data: {
      datasets: groups.map(g => ({
        label: `G${g.groupID} (${g.quality}) P=${g.P}`,
        data: [{x: g.T, y: g.W, r: Math.max(10, g.P * 0.18 + 8)}],
        backgroundColor: withAlpha(baseColors[g.quality], 0.65),
        borderColor: hslBlend(baseColors[g.quality], -0.1),
        borderWidth: 2,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 400, easing: 'easeOutQuart' },
      plugins: {
        tooltip: {
          callbacks: {
            label: ctx => {
              const g = groups[ctx.datasetIndex];
              return [
                `G${g.groupID}: P=${g.P}, T=${g.T}ms, W=${g.W}ms`,
                `正确率: ${g.accuracy.toFixed(1)}% | 遗漏率: ${g.omissionRate.toFixed(1)}%`,
                `质量: ${g.quality} | ${g.nSubjects}位被试`,
              ];
            }
          }
        },
        legend: { labels: { color: legendColor, usePointStyle: true, filter: (item, data) => data.datasets.length <= 8 ? true : item.index < 8 } },
        subtitle: { display: true, text: '气泡大小 ∝ P (练习试次) | 颜色 = 数据质量', color: textColor, font: { size: 11 } }
      },
      scales: {
        x: {
          type: 'linear',
          title: { display: true, text: '刺激呈现 T (ms)', color: textColor },
          ticks: { color: textColor }, grid: { color: gridColor },
          min: -10, max: 560,
        },
        y: {
          type: 'linear',
          title: { display: true, text: '反应窗口 W (ms)', color: textColor },
          ticks: { color: textColor }, grid: { color: gridColor },
          min: 0, max: 1700,
        }
      }
    },
    plugins: [rugPlugin],
  });
}

let designPVizInst = null, designTVizInst = null, designWVizInst = null;
function renderDesignTrendPanels(allGroups) {
  const qualityColors = {good:'#4caf50',caution:'#ff9800',exclude:'#f44336'};
  const textColor = appState.theme === 'light' ? '#5a6c7d' : '#90a4ae';
  const gridColor = appState.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)';
  const legendColor = appState.theme === 'light' ? '#2c3e50' : '#e0e0e0';

  const configs = [
    { id: 'designPVizChart', ref: 'designPVizInst', xKey: 'P', title: 'P vs Accuracy', xLabel: 'P (trials)' },
    { id: 'designTVizChart', ref: 'designTVizInst', xKey: 'T', title: 'T vs Accuracy', xLabel: 'T (ms)' },
    { id: 'designWVizChart', ref: 'designWVizInst', xKey: 'W', title: 'W vs Accuracy', xLabel: 'W (ms)' },
  ];

  configs.forEach(cfg => {
    const canvas = document.getElementById(cfg.id);
    if (!canvas) return;
    const ctx = canvas.getContext('2d');

    // 删除旧实例
    if (cfg.ref === 'designPVizInst' && designPVizInst) designPVizInst.destroy();
    if (cfg.ref === 'designTVizInst' && designTVizInst) designTVizInst.destroy();
    if (cfg.ref === 'designWVizInst' && designWVizInst) designWVizInst.destroy();

    const points = allGroups.map(g => ({
      x: g[cfg.xKey],
      y: g.accuracy,
      r: Math.max(4, g.nSubjects * 3),
      quality: g.quality,
      label: `G${g.groupID}: ${g.accuracy.toFixed(1)}%`,
    }));

    const xs = points.map(p => p.x);
    const ys = points.map(p => p.y);
    const fit = points.length >= 3 ? polyFit(xs, ys, 1) : null;

    const datasets = [{
      label: 'Accuracy',
      data: points,
      backgroundColor: points.map(p => withAlpha(qualityColors[p.quality], 0.75)),
      borderColor: points.map(p => hslBlend(qualityColors[p.quality], -0.08)),
      borderWidth: 1,
    }];

    if (fit) {
      const sortedX = [...xs].sort((a,b)=>a-b);
      const xMin = sortedX[0], xMax = sortedX[sortedX.length-1];
      const xRange = xMax - xMin || 0.001;
      const fitPoints = [];
      for (let i = 0; i <= 50; i++) {
        const x = xMin + (xRange * i / 50);
        fitPoints.push({x, y: predictPoly(fit, x)});
      }
      datasets.push({
        label: 'trend',
        data: fitPoints,
        type: 'line',
        borderColor: textColor,
        borderWidth: 1.5,
        borderDash: [4, 3],
        pointRadius: 0,
        fill: false,
      });
    }

    const inst = new Chart(ctx, {
      type: 'bubble',
      data: { datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        animation: { duration: 300 },
        plugins: {
          legend: { display: false },
          title: { display: true, text: cfg.title, color: textColor, font: { size: 10 } },
          tooltip: {
            callbacks: {
              label: ctx => {
                if (ctx.dataset.label === 'trend') return '';
                const p = points[ctx.dataIndex];
                return p ? `${p.label} | Quality: ${p.quality}` : '';
              }
            }
          }
        },
        scales: {
          x: {
            title: { display: true, text: cfg.xLabel, color: textColor, font: { size: 9 } },
            ticks: { color: textColor, font: { size: 8 } }, grid: { color: gridColor }

          y: {
            title: { display: true, text: 'Accuracy %', color: textColor, font: { size: 9 } },
            ticks: { color: textColor, font: { size: 8 } }, grid: { color: gridColor },

            max: Math.min(100, Math.max(...ys) + 10),
          }
        }
      }
    });

    if (cfg.ref === 'designPVizInst') designPVizInst = inst;
    else if (cfg.ref === 'designTVizInst') designTVizInst = inst;

// ===== SPE Correlation Table =====
function renderSpeCorrTable(speMerged) {
  const el = document.getElementById('designSpeCorrTable');
  if (!el) return;
  const valid = speMerged.filter(s => s.speRTd !== null);
  if (valid.length < 3) { el.innerHTML = '<div style="color:var(--text-secondary);">数据不足</div>'; return; }

  const computeCorr = (key) => {
    const xs = valid.map(s => s[key]);
    const ys = valid.map(s => s.speRTd);
    const r = pearsonR(xs, ys);
    const pVal = pValueFromR(r, xs.length);
    return { r, pVal };
  };
  const pCorr = computeCorr('P'), tCorr = computeCorr('T'), wCorr = computeCorr('W');

  const qualityMap = {1:'exclude',2:'exclude',3:'caution',4:'good',5:'good',6:'good',7:'good',8:'good'};
  const goodData = valid.filter(s => qualityMap[s.groupID] !== 'exclude');
  const goodCorr = goodData.length >= 3 ? {
    P: pearsonR(goodData.map(s=>s.P), goodData.map(s=>s.speRTd)),
    T: pearsonR(goodData.map(s=>s.T), goodData.map(s=>s.speRTd)),
    W: pearsonR(goodData.map(s=>s.W), goodData.map(s=>s.speRTd)),
  } : null;

  const formatR = (r) => (r !== undefined && r !== null) ? r.toFixed(3) : 'N/A';
  const sigStr = (p) => p < 0.001 ? '***' : p < 0.01 ? '**' : p < 0.05 ? '*' : p < 0.1 ? '~' : 'n.s.';

  el.innerHTML = `
    <div style="font-size:0.72em;line-height:1.7;background:var(--bg-card);padding:8px;border-radius:4px;height:100%;overflow-y:auto;">
      <div style="font-weight:600;color:var(--accent);margin-bottom:4px;">Pearson 相关系数</div>
      <table style="width:100%;border-collapse:collapse;">
        <tr style="color:var(--accent);"><th>参数</th><th>r (全部)</th><th>sig</th><th>r (good)</th></tr>
        <tr><td>P</td><td style="color:#e91e63;">${formatR(pCorr.r)}</td><td>${sigStr(pCorr.pVal)}</td><td style="color:#e91e63;">${formatR(goodCorr?.P)}</td></tr>
        <tr><td>T</td><td style="color:#ff9800;">${formatR(tCorr.r)}</td><td>${sigStr(tCorr.pVal)}</td><td style="color:#ff9800;">${formatR(goodCorr?.T)}</td></tr>
        <tr><td>W</td><td style="color:#2196f3;">${formatR(wCorr.r)}</td><td>${sigStr(wCorr.pVal)}</td><td style="color:#2196f3;">${formatR(goodCorr?.W)}</td></tr>
      </table>
      <div style="margin-top:6px;font-size:0.95em;">
        <div><b>SPE 均值:</b> ${(valid.reduce((s,v)=>s+v.speRTd,0)/valid.length).toFixed(3)}</div>
        <div><b>SPE 范围:</b> [${valid.reduce((a,v)=>Math.min(a,v.speRTd),Infinity).toFixed(3)}, ${valid.reduce((a,v)=>Math.max(a,v.speRTd),-Infinity).toFixed(3)}]</div>
        <div style="margin-top:2px;font-size:0.9em;color:var(--text-secondary);">*** p<.001 ** p<.01 * p<.05 ~ p<.1</div>
        <div style="font-size:0.85em;color:var(--text-secondary);">good = 排除不可靠组 (G1,G2)</div>
      </div>
    </div>
  `;
}

function pValueFromR(r, n) {
  if (n <= 2) return 1;
  const t = r * Math.sqrt((n - 2) / (1 - r * r));
  // Approximation of two-tailed p-value from t-distribution with n-2 df
  const df = n - 2;
  const x = df / (df + t * t);
  // Regularized incomplete beta function approximation
  let p = 1;
  if (df >= 1) {
    let a = df / 2, b = 0.5;
    p = regIncompleteBeta(x, a, b);
  }
  return Math.min(1, p);
}

function regIncompleteBeta(x, a, b) {
  // Simple continued fraction approximation
  if (x === 0 || x === 1) return x;
  const maxIter = 200;
  let f = 1, c = 1, d = 1 - (a + b) * x / (a + 1);
  if (Math.abs(d) < 1e-30) d = 1e-30;
  d = 1 / d;
  let h = d;
  for (let m = 1; m <= maxIter; m++) {
    const m2 = 2 * m;
    // Even term
    let aa = m * (b - m) * x / ((a + m2 - 1) * (a + m2));
    d = 1 + aa * d;
    if (Math.abs(d) < 1e-30) d = 1e-30;
    c = 1 + aa / c;
    if (Math.abs(c) < 1e-30) c = 1e-30;
    d = 1 / d;
    h *= d * c;
    // Odd term
    aa = -(a + m) * (a + b + m) * x / ((a + m2) * (a + m2 + 1));
    d = 1 + aa * d;
    if (Math.abs(d) < 1e-30) d = 1e-30;
    c = 1 + aa / c;
    if (Math.abs(c) < 1e-30) c = 1e-30;
    d = 1 / d;
    const del = d * c;
    h *= del;
    if (Math.abs(del - 1) < 1e-10) break;
  }
  return Math.exp(Math.log(x) * a + Math.log(1 - x) * b - Math.log(a) - lnBeta(a, b)) * h;
}

function lnBeta(a, b) {
  return lgamma(a) + lgamma(b) - lgamma(a + b);
}

function lgamma(x) {
  // Stirling's approximation
  if (x < 0.5) return Math.log(Math.PI / Math.sin(Math.PI * x)) - lgamma(1 - x);
  x -= 1;
  let s = 0.99999999999980993;
  const g = 7;
  const c = [676.5203681218851, -1259.1392167224028, 771.32342877765313, -176.61502916214059,
    12.507343278686905, -0.13857109526572012, 9.9843695780195716e-6, 1.5056327351493116e-7];
  for (let i = 0; i < g + 1; i++) s += c[i] / (x + i + 1);
  const t = x + g + 0.5;
  return 0.5 * Math.log(2 * Math.PI) + (x + 0.5) * Math.log(t) - t + Math.log(s);
}

  if (!speData.length) { el.style.display = 'none'; return; }
  const valid = speData.filter(s => s.speRTd !== null);
  if (!valid.length) { el.style.display = 'none'; return; }
  el.style.display = '';
  const avg = valid.reduce((s,v)=>s+v.speRTd,0)/valid.length;
  const maxSpe = valid.reduce((a,v)=>Math.max(a,v.speRTd),-Infinity);
  const minSpe = valid.reduce((a,v)=>Math.min(a,v.speRTd),Infinity);
  const posCount = valid.filter(s=>s.speRTd>0).length;
  el.innerHTML = `
    <div style="font-weight:600;color:var(--accent);margin-bottom:3px;">SPE 自我优势效应摘要</div>
    <div style="line-height:1.6;">
      <div>Cohen's d(RT) 均值: <b>${avg.toFixed(3)}</b></div>
      <div>范围: [${minSpe.toFixed(3)}, ${maxSpe.toFixed(3)}]</div>
      <div>正向SPE组数: <b>${posCount}/${valid.length}</b> (Self比Stranger快)</div>
      <div style="margin-top:2px;font-size:0.9em;color:var(--text-secondary);">SPE_RT = (Mean_Stranger_RT − Mean_Self_RT) / pooled_SD | SPE_ACC = (Self_ACC − Stranger_ACC)</div>
    </div>
  `;
}
