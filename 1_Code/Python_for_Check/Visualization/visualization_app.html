// ==================== 3D DESIGN SPACE (ggcube coord_3d engine v2) ====================
let d3dAnimFrame = null;
const GROUP_PALETTE = ['#e91e63','#2196f3','#4caf50','#ff9800','#9c27b0','#00bcd4','#ffeb3b','#795548'];
let d3dState = { pitch: 20, roll: -55, yaw: -25, persp: true, dist: 2, zoom: 1.0, autoRot: false, showIndividuals: false, dragging: false, lastX: 0, lastY: 0, autoAngle: 0, hitCache: [], dragSensitivity: 0.6 };

function d3dHash01(seed) {
  let h = 2166136261;
  const s = String(seed);
  for (let i = 0; i < s.length; i++) {
    h ^= s.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return ((h >>> 0) % 1000000) / 1000000;
}

function d3dJitter(seed, span) {
  return (d3dHash01(seed) - 0.5) * span;
}

function d3dStableSample(items, maxCount) {
  if (items.length <= maxCount) return items;
  const step = items.length / maxCount;
  return Array.from({ length: maxCount }, (_, i) => items[Math.floor(i * step)]);
}

function init3DControls() {
  const sliders = { d3dPitch:'pitch', d3dRoll:'roll', d3dYaw:'yaw' };
  for (const [id, key] of Object.entries(sliders)) {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', () => {
      d3dState[key] = parseFloat(el.value);
      render3DDesignSpace();
    });
  }
  const perspCb = document.getElementById('d3dPersp');
  if (perspCb) perspCb.addEventListener('change', () => { d3dState.persp = perspCb.checked; render3DDesignSpace(); });
  const autoCb = document.getElementById('d3dAutoRot');
  if (autoCb) autoCb.addEventListener('change', () => {
    d3dState.autoRot = autoCb.checked;
    if (autoCb.checked) start3DAutoRotate(); else stop3DAutoRotate();
  });
  const zoomEl = document.getElementById('d3dZoom');
  if (zoomEl) zoomEl.addEventListener('input', () => { d3dState.zoom = parseInt(zoomEl.value) / 100; render3DDesignSpace(); });
  const indivCb = document.getElementById('d3dShowIndiv');
  if (indivCb) indivCb.addEventListener('change', () => { d3dState.showIndividuals = indivCb.checked; render3DDesignSpace(); });
  const mainCanvas = document.getElementById('design3DCanvas');
  if (mainCanvas) {
    mainCanvas.addEventListener('mousedown', (e) => {
      d3dState.dragging = true;
      d3dState.lastX = e.clientX;
      d3dState.lastY = e.clientY;
      e.preventDefault();
    });
    mainCanvas.addEventListener('mousemove', (e) => {
      if (!d3dState.dragging) {
        const rect = mainCanvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        update3DTooltip(mx, my);
        return;
      }
      const dx = e.clientX - d3dState.lastX;
      const dy = e.clientY - d3dState.lastY;
      const sens = d3dState.dragSensitivity;

      d3dState.yaw += dx * sens;
      d3dState.pitch -= dy * sens;

      d3dState.pitch = Math.max(-89, Math.min(89, d3dState.pitch));

      let normYaw = ((d3dState.yaw % 360) + 540) % 360;
      if (normYaw > 180) normYaw -= 360;
      d3dState.yaw = normYaw;

      d3dState.lastX = e.clientX;
      d3dState.lastY = e.clientY;

      document.getElementById('d3dPitch').value = Math.round(d3dState.pitch);
      document.getElementById('d3dYaw').value = Math.round(d3dState.yaw);

      render3DDesignSpace();
      e.preventDefault();
    });
    mainCanvas.addEventListener('mouseleave', () => { const tip = document.getElementById('d3dTooltip'); if(tip) tip.style.display = 'none'; });
    window.addEventListener('mouseup', () => { d3dState.dragging = false; });
  }
  const observer = new ResizeObserver(() => { if (getDesignGroupSummary().length > 0) render3DDesignSpace(); });
  const container = document.getElementById('design3DCanvas')?.parentElement?.parentElement;
  if (container) observer.observe(container);
}

function start3DAutoRotate() { stop3DAutoRotate(); const animate = () => { if (!d3dState.autoRot) return; d3dState.yaw = ((performance.now() * 0.03) % 360); if (d3dState.yaw > 180) d3dState.yaw -= 360; document.getElementById('d3dYaw').value = Math.round(d3dState.yaw); render3DDesignSpace(); d3dAnimFrame = requestAnimationFrame(animate); }; d3dAnimFrame = requestAnimationFrame(animate); }
function stop3DAutoRotate() { if (d3dAnimFrame) { cancelAnimationFrame(d3dAnimFrame); d3dAnimFrame = null; } }

function rotate3d(points, pitch, roll, yaw) {
  const pr = pitch * Math.PI / 180, rr = roll * Math.PI / 180, yr = yaw * Math.PI / 180;
  const cY = Math.cos(yr), sY = Math.sin(yr), cP = Math.cos(pr), sP = Math.sin(pr), cR = Math.cos(rr), sR = Math.sin(rr);
  const R = [cY * cP, cY * sP * sR - sY * cR, cY * sP * cR + sY * sR, sY * cP, sY * sP * sR + cY * cR, sY * sP * cR - cY * sR, -sP, cP * sR, cP * cR];
  return points.map(p => ({ x: p.x * R[0] + p.y * R[1] + p.z * R[2], y: p.x * R[3] + p.y * R[4] + p.z * R[5], z: p.x * R[6] + p.y * R[7] + p.z * R[8] }));
}

function project3D(points, dist, persp) {
  return points.map(p => { const zOff = p.z + dist; const pf = persp ? (dist / zOff) : 1; const refPf = persp ? (dist / dist) : 1; return { x: p.x * pf, y: p.y * pf, z: p.z, depth: Math.sqrt(p.x*p.x + p.y*p.y + zOff*zOff), depthScale: refPf / pf }; });
}

function hslBlend3D(hexColor, depthScale) { const { r, g, b } = hexToRgb(hexColor); const { h, s, l } = rgbToHsl(r, g, b); const newL = Math.min(0.92, Math.max(0.08, l * (0.4 + 0.6 * depthScale))); const res = hslToRgb(h, s, newL); return rgbToHex(res.r, res.g, res.b); }

function scaleToStandard3D(values, range) { const rng = range[1] - range[0] || 1; return values.map(v => (v - range[0]) / rng - 0.5); }

function update3DTooltip(mx, my) {
  const tip = document.getElementById('d3dTooltip'); if (!tip) return;
  let found = null; let bestDist = 15 * 15;
  for (const h of d3dState.hitCache) { const dx = mx - h.sx, dy = my - h.sy; const d = dx*dx + dy*dy; if (d < bestDist && d < h.r*h.r) { found = h; bestDist = d; } }
  if (found) { tip.style.display = 'block'; tip.style.left = (found.sx + 18) + 'px'; tip.style.top = (found.sy - 10) + 'px';
    const rtStr = found.meanRT > 0 ? `RT: <b>${(found.meanRT * 1000).toFixed(0)}ms</b> | ` : '';
    tip.innerHTML = `<b>${found.label}</b> | ${found.quality}<br/>ACC: <b>${found.acc.toFixed(1)}%</b> | OM: <b>${found.om.toFixed(1)}%</b><br/>${rtStr}T=${found.T}ms W=${found.W}ms P=${found.P}`;
  } else { tip.style.display = 'none'; }
}

function draw3DLabel(ctx, sx, sy, text, color, bgAlpha) {
  ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  const tm = ctx.measureText(text); const tw = tm.width, th = 12, pad = 3;
  ctx.fillStyle = color.replace(')', `,${bgAlpha})`).replace('rgb', 'rgba');
  if (color.startsWith('#')) { const {r,g,b}=hexToRgb(color); ctx.fillStyle = `rgba(${r},${g},${b},${bgAlpha})`; }
  ctx.fillRect(sx - tw/2 - pad, sy - th/2 - pad, tw + pad*2, th + pad*2);
  ctx.fillStyle = '#fff'; ctx.fillText(text, sx, sy + 4);
}

function render3DDesignSpace() {
  const canvas = document.getElementById('design3DCanvas'); if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width; canvas.height = 380;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const scale = Math.min(W, H) * 0.36 * d3dState.zoom;
  d3dState.hitCache = [];

  ctx.clearRect(0, 0, W, H);
  const bgColor = appState.theme === 'light' ? '#f5f7fa' : '#0f1923';
  ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H);

  const summary = getDesignGroupSummary();
  if (summary.length === 0) { ctx.fillStyle = '#90a4ae'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center'; ctx.fillText('请先加载数据 (点击左侧「加载所有数据进行分析」)', cx, cy); return; }

  const groups = getFilteredDesignGroups();
  const allGroups = getDesignGroupSummary();
  const showGood = document.getElementById('designQualityGood')?.checked ?? true;
  const showCaution = document.getElementById('designQualityCaution')?.checked ?? true;
  const showExclude = document.getElementById('designQualityExclude')?.checked ?? true;
  const allChecked = showGood && showCaution && showExclude;
  const filterBadge = document.getElementById('d3dFilterBadge');
  if (filterBadge) {
    const filtered = allGroups.length - groups.length;
    if (allChecked) {
      filterBadge.innerHTML = '<span class="filter-badge all">全部组 (8)</span>';
    } else if (filtered === allGroups.length) {
      filterBadge.innerHTML = '<span class="filter-badge" style="background:rgba(244,67,54,0.2);color:#f44336;border:1px solid rgba(244,67,54,0.4);">无选中组</span>';
    } else {
      const activeQualities = [];
      if (showGood) activeQualities.push('Good');
      if (showCaution) activeQualities.push('Caution');
      if (showExclude) activeQualities.push('Exclude');
      filterBadge.innerHTML = `<span class="filter-badge active">${activeQualities.join('+')} | ${groups.length}/${allGroups.length}组</span>`;
    }
  }

  const { pitch, roll, yaw } = d3dState;

  const rangeGroups = allGroups.length ? allGroups : groups;
  const tVals = rangeGroups.map(g => g.T); const wVals = rangeGroups.map(g => g.W); const pVals = rangeGroups.map(g => g.P);
  const tRange = [Math.min(0, ...tVals) - 10, Math.max(...tVals) + 10];
  const wRange = [Math.min(0, ...wVals) - 50, Math.max(...wVals, 1600) + 50];
  const pRange = [Math.min(0, ...pVals) - 5, Math.max(...pVals, 130) + 10];

  // Group color mapping
  const getGroupColor = (gid) => GROUP_PALETTE[(gid - 1) % 8];
  const qualityColors = { good: '#4caf50', caution: '#ff9800', exclude: '#f44336' };

  // --- CUBE WIREFRAME ---
  const corners = [[-0.5,-0.5,-0.5],[0.5,-0.5,-0.5],[0.5,0.5,-0.5],[-0.5,0.5,-0.5],[-0.5,-0.5,0.5],[0.5,-0.5,0.5],[0.5,0.5,0.5],[-0.5,0.5,0.5]];
  const edges = [[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
  const cornerPts = corners.map(c => ({ x: c[0], y: c[1], z: c[2] }));
  const projectAll = (pts, p, r, ye) => { const rot = rotate3d(pts, p, r, ye); return project3D(rot, d3dState.dist, d3dState.persp); };

  // --- REFERENCE GRID PLANES (ggcube panel background) ---
  const halfCube = 0.5;
  const gridSteps = 5;
  const gridAlpha = 0.06;
  for (let step = 0; step <= gridSteps; step++) {
    const v = -halfCube + (halfCube * 2) * step / gridSteps;
    const xzLines = [], yzLines = [];
    for (let i = 0; i <= gridSteps; i++) {
      const u = -halfCube + (halfCube * 2) * i / gridSteps;
      xzLines.push({x:u,y:0,z:v}); yzLines.push({x:v,y:0,z:u});
    }
    const xzProj = projectAll(xzLines, pitch, roll, yaw);
    const yzProj = projectAll(yzLines, pitch, roll, yaw);
    ctx.strokeStyle = appState.theme === 'light' ? `rgba(0,0,0,${gridAlpha})` : `rgba(255,255,255,${gridAlpha*0.8})`;
    ctx.lineWidth = 0.5;
    xzProj.forEach((pt, i) => { if (i % 2 === 0) ctx.beginPath(); ctx.lineTo(cx + pt.x * scale, cy - pt.y * scale); if (i % 2 === 1) ctx.stroke(); });
    yzProj.forEach((pt, i) => { if (i % 2 === 0) ctx.beginPath(); ctx.lineTo(cx + pt.x * scale, cy - pt.y * scale); if (i % 2 === 1) ctx.stroke(); });
  }

  // Wireframe
  const wireProj = projectAll(cornerPts, pitch, roll, yaw);
  ctx.strokeStyle = appState.theme === 'light' ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.8; ctx.setLineDash([4, 4]);
  edges.forEach(([a, b]) => { ctx.beginPath(); ctx.moveTo(cx + wireProj[a].x * scale, cy - wireProj[a].y * scale); ctx.lineTo(cx + wireProj[b].x * scale, cy - wireProj[b].y * scale); ctx.stroke(); });
  ctx.setLineDash([]);

  // --- AXES with labels and units ---
  const axisPts = projectAll([{x:0.55,y:0,z:0},{x:-0.55,y:0,z:0},{x:0,y:0.55,z:0},{x:0,y:-0.55,z:0},{x:0,y:0,z:0.55},{x:0,y:0,z:-0.55}], pitch, roll, yaw);
  const axisColors = ['#ff9800','#2196f3','#4caf50'];
  const axisLabels = ['T 刺激呈现 (ms)','W 反应窗口 (ms)','P 练习次数'];
  const axisUnits = [tRange, wRange, pRange];

  for (let a = 0; a < 3; a++) {
    const posEnd = axisPts[a*2];
    const posStart = axisPts[a*2+1];
    ctx.strokeStyle = axisColors[a]; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(cx + posEnd.x * scale, cy - posEnd.y * scale);
    ctx.lineTo(cx + posStart.x * scale, cy - posStart.y * scale);
    ctx.stroke();
    const tipX = cx + posEnd.x * scale, tipY = cy - posEnd.y * scale;
    const tipDx = (posEnd.x - posStart.x), tipDy = -(posEnd.y - posStart.y);
    const tipLen = Math.sqrt(tipDx*tipDx + tipDy*tipDy) || 1;
    const tipUx = tipDx / tipLen, tipUy = tipDy / tipLen;
    const arrowSize = 8;
    ctx.fillStyle = axisColors[a];
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - tipUx * arrowSize + tipUy * arrowSize * 0.5, tipY - tipUy * arrowSize - tipUx * arrowSize * 0.5);
    ctx.lineTo(tipX - tipUx * arrowSize - tipUy * arrowSize * 0.5, tipY - tipUy * arrowSize + tipUx * arrowSize * 0.5);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = axisColors[a]; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(axisLabels[a], tipX + tipUx * 12, tipY + tipUy * 12 - 4);

    for (let step = 1; step <= 3; step++) {
      const frac = step / 4;
      const tickX = posStart.x + (posEnd.x - posStart.x) * frac;
      const tickY = posStart.y + (posEnd.y - posStart.y) * frac;
      const tx = cx + tickX * scale, ty = cy - tickY * scale;
      ctx.fillStyle = axisColors[a]; ctx.globalAlpha = 0.6;
      ctx.beginPath(); ctx.arc(tx, ty, 2, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;

      const val = axisUnits[a][0] + (axisUnits[a][1] - axisUnits[a][0]) * frac;
      let valStr;
      if (a === 2) valStr = val.toFixed(0);
      else valStr = (val / 1000).toFixed(1) + 's';
      ctx.fillStyle = appState.theme === 'light' ? 'rgba(0,0,0,0.4)' : 'rgba(255,255,255,0.35)';
      ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(valStr, tx + tipUy * 10, ty - tipUx * 10);
    }

    const startX = cx + posStart.x * scale, startY = cy - posStart.y * scale;
    const u = a === 0 ? axisUnits[a][0].toFixed(0) : (a === 2 ? axisUnits[a][0].toFixed(0) : (axisUnits[a][0]/1000).toFixed(1)+'s');
    ctx.fillStyle = appState.theme === 'light' ? 'rgba(0,0,0,0.45)' : 'rgba(255,255,255,0.4)';
    ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(u, startX, startY + 14);
  }

  // --- ORIGIN MARKER ---
  const origin = projectAll([{x:0,y:0,z:0}], pitch, roll, yaw)[0];
  ctx.fillStyle = '#fff'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx + origin.x * scale, cy - origin.y * scale, 3, 0, Math.PI*2); ctx.fill(); ctx.stroke();

  // --- BUILD POINTS ---
  const points3D = groups.map(g => ({
    x: scaleToStandard3D([g.T], tRange)[0], y: scaleToStandard3D([g.W], wRange)[0], z0: scaleToStandard3D([g.P], pRange)[0],
    r: Math.max(8, g.accuracy * 0.24 + 4), acc: g.accuracy, om: g.omissionRate, meanRT: g.meanRT,
    groupID: g.groupID, color: getGroupColor(g.groupID), quality: g.quality, qualityColor: qualityColors[g.quality],
    label: `G${g.groupID}`, T: g.T, W: g.W, P: g.P
  }));

  // build individual subject points
  let indivPts = [];
  if (d3dState.showIndividuals && appState.allData?.trials) {
    const displayGroups = new Set(groups.map(g => g.groupID));
    const allGroupSet = new Set(allGroups.map(g => g.groupID));
    const subjData = {};
    appState.allData.trials.forEach(t => {
      if (t.stage !== 'formal' || !t.RT || !allGroupSet.has(t.groupID)) return;
      if (!subjData[t.groupID]) subjData[t.groupID] = [];
      subjData[t.groupID].push(t);
    });
    for (const [gid, trials] of Object.entries(subjData)) {
      const gidNum = parseInt(gid);
      const isDisplayed = displayGroups.has(gidNum);
      const sample = d3dStableSample(trials, 300);
      const gInfo = allGroups.find(g => g.groupID === gidNum);
      if (!gInfo) continue;
      const baseX = scaleToStandard3D([gInfo.T], tRange)[0];
      const baseY = scaleToStandard3D([gInfo.W], wRange)[0];
      const baseZ = scaleToStandard3D([gInfo.P], pRange)[0];
      if (isDisplayed) {
        sample.forEach(t => {
          const rtFactor = Math.min(1, Math.max(-1, (t.RT * 1000 - 400) / 1200));
          const seed = `${gidNum}-${t.subjectID}-${t.trialID}`;
          indivPts.push({
            x: baseX + d3dJitter(`${seed}-x`, 0.12),
            y: baseY + rtFactor * 0.06 + d3dJitter(`${seed}-y`, 0.06),
            z0: baseZ + d3dJitter(`${seed}-z`, 0.12),
            r: 1.5 + d3dHash01(`${seed}-r`) * 1.5,
            color: getGroupColor(gidNum),
            groupID: gidNum, isDisplayed: true
          });
        });
      } else {
        const filteredSample = d3dStableSample(sample, 80);
        filteredSample.forEach(t => {
          const seed = `${gidNum}-${t.subjectID}-${t.trialID}`;
          indivPts.push({
            x: baseX + d3dJitter(`${seed}-x`, 0.12),
            y: baseY + d3dJitter(`${seed}-y`, 0.08),
            z0: baseZ + d3dJitter(`${seed}-z`, 0.12),
            r: 1.0 + d3dHash01(`${seed}-r`) * 0.6,
            color: getGroupColor(gidNum),
            groupID: gidNum, isDisplayed: false
          });
        });
      }
    }
  }

  // --- DEPTH SORT & RENDER ---
  const allPtsFlat = [
    ...points3D.map(p => ({ ...p, z: p.z0, isIndiv: false })),
    ...indivPts.map(p => ({ ...p, z: p.z0, isIndiv: true, acc: 0, om: 0, quality: '', qualityColor: '', label:'', T:0, W:0, P:0, meanRT: 0 }))
  ];
  const projAll = projectAll(allPtsFlat, pitch, roll, yaw);
  const sorted = projAll.map((p, i) => ({ ...allPtsFlat[i], ...p, idx: i })).sort((a, b) => b.depth - a.depth);

  sorted.forEach(({ x, y, depthScale, isIndiv, r, color, qualityColor, groupID, label, acc, om, quality, T, W, P, meanRT, isDisplayed }) => {
    const sx = cx + x * scale, sy = cy - y * scale;
    if (sx < -60 || sx > W + 60 || sy < -60 || sy > H + 60) return;

    if (isIndiv) {
      const alpha = isDisplayed === false ? 0.08 + depthScale * 0.05 : 0.22 + depthScale * 0.18;
      ctx.fillStyle = withAlpha(color, alpha);
      ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI*2); ctx.fill();
    } else {
      const litColor = hslBlend3D(color, depthScale);
      const radius = r * (0.8 + 0.2 * depthScale);
      const grad = ctx.createRadialGradient(sx - radius*0.25, sy - radius*0.3, radius*0.1, sx, sy, radius);
      grad.addColorStop(0, hslBlend3D(color, Math.min(1, depthScale + 0.15)));
      grad.addColorStop(0.6, litColor);
      grad.addColorStop(1, hslBlend3D(color, Math.max(0.1, depthScale - 0.25)));
      ctx.beginPath(); ctx.arc(sx, sy, radius, 0, Math.PI*2);
      ctx.fillStyle = grad; ctx.fill();
      ctx.lineWidth = 2.5;
      ctx.strokeStyle = appState.theme === 'light'
        ? (quality === 'good' ? '#2e7d32' : quality === 'caution' ? '#e65100' : '#c62828')
        : (quality === 'good' ? '#81c784' : quality === 'caution' ? '#ffb74d' : '#ef9a9a');
      ctx.stroke();
      const lblFontSize = Math.max(8, radius * 0.42);
      ctx.fillStyle = appState.theme === 'light' ? '#1a1a2e' : '#e0e0e0';
      ctx.font = `bold ${lblFontSize}px sans-serif`; ctx.textAlign = 'center';
      ctx.fillText(acc.toFixed(0) + '%', sx, sy + 1);
      ctx.fillStyle = withAlpha(color, 0.85); ctx.font = `bold ${Math.max(7, radius * 0.35)}px sans-serif`;
      ctx.fillText('OM:' + om.toFixed(1) + '%', sx, sy - radius * 0.15 + 2);
      ctx.fillStyle = color; ctx.font = `bold ${Math.max(7, radius * 0.4)}px sans-serif`;
      ctx.fillText(label, sx, sy - radius - 3);

      d3dState.hitCache.push({ sx, sy, r: radius, label, quality: quality === 'good' ? 'Good' : quality === 'caution' ? 'Caution' : 'Exclude', acc, om, T, W, P, meanRT });
    }
  });

  render3DFaceProjections(summary, tRange, wRange, pRange);
}

function render3DFaceProjections(summary, tRange, wRange, pRange) {
  const qualityColors = { good: '#4caf50', caution: '#ff9800', exclude: '#f44336' };
  const showGood = document.getElementById('designQualityGood')?.checked ?? true;
  const showCaution = document.getElementById('designQualityCaution')?.checked ?? true;
  const showExclude = document.getElementById('designQualityExclude')?.checked ?? true;

  const drawFace = (canvasId, xKey, yKey, xRange, yRange, title, xUnit, yUnit) => {
    const canvas = document.getElementById(canvasId); if (!canvas) return;
    const parent = canvas.parentElement;
    const r = parent.getBoundingClientRect();
    canvas.width = r.width; canvas.height = r.height;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    const bgColor = appState.theme === 'light' ? '#f0f3f8' : '#0d1b2a';
    ctx.fillStyle = bgColor; ctx.fillRect(0, 0, W, H);
    if (summary.length === 0) return;

    const margin = { l: 34, r: 14, t: 20, b: 26 };
    const pw = W - margin.l - margin.r, ph = H - margin.t - margin.b;

    const txtC = appState.theme === 'light' ? '#3a5068' : '#b0bec5';
    ctx.fillStyle = txtC; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(title, W/2, 12);

    ctx.strokeStyle = appState.theme === 'light' ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.5;
    for (let i = 1; i <= 4; i++) {
      const px = margin.l + pw * i / 5, py = margin.t + ph * i / 5;
      ctx.beginPath(); ctx.moveTo(px, margin.t); ctx.lineTo(px, margin.t + ph); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(margin.l, py); ctx.lineTo(margin.l + pw, py); ctx.stroke();
    }

    const axesC = appState.theme === 'light' ? 'rgba(0,0,0,0.15)' : 'rgba(255,255,255,0.1)';
    ctx.strokeStyle = axesC; ctx.lineWidth = 1;
    ctx.strokeRect(margin.l, margin.t, pw, ph);

    const isFiltered = (g) => {
      if (g.quality === 'good' && !showGood) return true;
      if (g.quality === 'caution' && !showCaution) return true;
      if (g.quality === 'exclude' && !showExclude) return true;
      return false;
    };

    const filtered = [];
    summary.forEach(g => {
      const groupColor = GROUP_PALETTE[(g.groupID - 1) % 8];
      const nx = (g[xKey] - xRange[0]) / (xRange[1] - xRange[0] || 1);
      const ny = 1 - (g[yKey] - yRange[0]) / (yRange[1] - yRange[0] || 1);
      const sx = margin.l + nx * pw, sy = margin.t + ny * ph;
      const radius = Math.max(3.5, g.accuracy * 0.12 + 2.5);
      const filteredOut = isFiltered(g);

      if (filteredOut) {
        filtered.push({ sx, sy, radius, groupColor, g, qualityColor: qualityColors[g.quality] });
        return;
      }

      ctx.beginPath(); ctx.arc(sx, sy, radius, 0, Math.PI*2);
      ctx.fillStyle = withAlpha(groupColor, 0.75); ctx.fill();
      ctx.strokeStyle = qualityColors[g.quality]; ctx.lineWidth = 1.8; ctx.stroke();
      ctx.fillStyle = appState.theme === 'light' ? '#1a1a2e' : '#e0e0e0';
      ctx.font = 'bold 7px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText(`G${g.groupID}`, sx, sy - radius - 3);
    });

    filtered.forEach(({ sx, sy, radius, groupColor, g, qualityColor }) => {
      ctx.beginPath(); ctx.arc(sx, sy, radius, 0, Math.PI*2);
      ctx.fillStyle = withAlpha(groupColor, 0.16); ctx.fill();
      ctx.strokeStyle = withAlpha(qualityColor, 0.25); ctx.lineWidth = 1; ctx.stroke();
      ctx.setLineDash([1.5, 2]); ctx.strokeStyle = withAlpha(qualityColor, 0.3); ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.arc(sx, sy, radius + 3, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    });

    ctx.fillStyle = txtC; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(xUnit, margin.l + pw/2, H - 3);

    ctx.save();
    ctx.translate(7, margin.t + ph/2);
    ctx.rotate(-Math.PI/2);
    ctx.fillText(yUnit, 0, 0);
    ctx.restore();

    const xRangeSize = xRange[1] - xRange[0];
    const yRangeSize = yRange[1] - yRange[0];
    const xStep = xRangeSize >= 200 ? Math.ceil(xRangeSize / 5 / 100) * 100 : Math.ceil(xRangeSize / 5);
    const yStep = yRangeSize >= 200 ? Math.ceil(yRangeSize / 5 / 100) * 100 : Math.ceil(yRangeSize / 5);

    ctx.font = '7px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = txtC;
    for (let v = xRange[0]; v <= xRange[1] + xStep * 0.5; v += xStep) {
      if (Math.abs(v - xRange[0]) < 0.01 || Math.abs(v - xRange[1]) < 0.01) continue;
      const px = margin.l + ((v - xRange[0]) / xRangeSize) * pw;
      ctx.fillText(v.toFixed(0), px, margin.t + ph + 12);
    }
    ctx.fillText(xRange[0].toFixed(0), margin.l, margin.t + ph + 12);
    ctx.fillText(xRange[1].toFixed(0), margin.l + pw, margin.t + ph + 12);

    ctx.textAlign = 'right';
    for (let v = yRange[0]; v <= yRange[1] + yStep * 0.5; v += yStep) {
      if (Math.abs(v - yRange[0]) < 0.01 || Math.abs(v - yRange[1]) < 0.01) continue;
      const py = margin.t + ph - ((v - yRange[0]) / yRangeSize) * ph;
      ctx.fillText(v.toFixed(0), margin.l - 4, py + 3);
    }
    ctx.fillText(yRange[0].toFixed(0), margin.l - 4, margin.t + ph + 3);
    ctx.fillText(yRange[1].toFixed(0), margin.l - 4, margin.t + 3);
  };

  drawFace('design3DTop', 'T', 'W', tRange, wRange, '俯视图: T × W 设计空间', 'T 刺激呈现 (ms)', 'W 窗口 (ms)');
  drawFace('design3DFront', 'T', 'P', tRange, pRange, '前视图: T × P 设计空间', 'T 刺激呈现 (ms)', 'P 练习次数');
  drawFace('design3DSide', 'W', 'P', wRange, pRange, '侧视图: W × P 设计空间', 'W 窗口 (ms)', 'P 练习次数');
}

}

function setSPEActiveBtn(id) {
  ['speBtnOverview','speBtnPW','speBtnTW','speBtnIndividual'].forEach(bid => {
    const el = document.getElementById(bid); if (el) el.classList.remove('active');
  });
  const a = document.getElementById(id); if (a) a.classList.add('active');
}

async function ensureSPEData() {
  if (_speData) return _speData;
  const rp = document.getElementById('speRightCharts');
  if (rp) rp.innerHTML = '<div style="text-align:center;padding-top:40px;color:var(--accent);">⏳ 加载SPE数据库 (计算Cohen\'s d中...)</div>';
  try {
    _speData = await fetchAPI('/api/spe/overview');
    return _speData;
  } catch(e) {
    if (rp) rp.innerHTML = '<div style="text-align:center;padding-top:40px;color:#f44336;">加载失败: '+e.message+'</div>';
    return null;
  }
}

function switchSPEView(view) {
  switch(view) {
    case 'overview': setSPEActiveBtn('speBtnOverview'); renderSPEOverview(); break;
    case 'pw': setSPEActiveBtn('speBtnPW'); renderSPEPW(); break;
    case 'tw': setSPEActiveBtn('speBtnTW'); renderSPETW(); break;
    case 'individual': setSPEActiveBtn('speBtnIndividual'); renderSPEIndividual(); break;
  }
}

  if (!data || !data.experiments) return;
  destroySPECharts();

  const nValid = exps.length;
  const nTotal = data.experiments.length;
  const rp = document.getElementById('speRightCharts');
  rp.innerHTML = `
    <div style="font-weight:600;color:var(--accent);">群体总览 (${nValid}/${nTotal} 实验有有效SPE)</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <div style="flex:1;min-width:320px;height:300px;"><canvas id="speHistRT"></canvas></div>
      <div style="flex:1;min-width:320px;height:300px;"><canvas id="speHistACC"></canvas></div>
    </div>
    <div style="font-size:0.72em;color:var(--text-secondary);line-height:1.5;">
      SPE<sub>RT</sub> 均值=${(exps.reduce((s,e)=>s+e.spe_rt_d,0)/nValid).toFixed(3)}, 
      SD=${Math.sqrt(exps.reduce((s,e)=>s+(e.spe_rt_d-exps.reduce((s2,e2)=>s2+e2.spe_rt_d,0)/nValid)**2,0)/nValid).toFixed(3)},
      范围=[${exps.reduce((a,e)=>Math.min(a,e.spe_rt_d),Infinity).toFixed(3)}, ${exps.reduce((a,e)=>Math.max(a,e.spe_rt_d),-Infinity).toFixed(3)}]
    </div>
  `;
  renderSPEHistogram('speHistRT', exps.map(e => e.spe_rt_d), 'SPE (RT Cohen\'s d)', '#ff9800');
  renderSPEHistogram('speHistACC', exps.filter(e=>e.spe_acc_d!==null).map(e=>e.spe_acc_d), 'SPE (ACC Cohen\'s d)', '#4caf50');

  // Left panel: experiment list
  const ld = document.getElementById('speLeftDetail');
  ld.innerHTML = `
    <div style="font-weight:600;margin-bottom:4px;">实验列表 (点击查看详情)</div>
    <div style="max-height:calc(100vh - 300px);overflow-y:auto;">
      ${data.experiments.map(e => {
        const d = e.spe_rt_d;
        const color = d === null ? '#888' : (d > 0 ? '#ff9800' : '#2196f3');
        const sign = d === null ? 'N/A' : (d > 0 ? '+' : '');
        return `<div class="spe-exp-row" data-key="${e.pairKey}" style="padding:3px 6px;cursor:pointer;border-bottom:1px solid var(--border);font-size:0.72em;display:flex;justify-content:space-between;">
          <span>${e.pairKey}</span>
          <span style="color:${color};font-weight:600;">${sign}${d !== null ? d.toFixed(3) : 'N/A'}</span>
        </div>`;
      }).join('')}

  ld.querySelectorAll('.spe-exp-row').forEach(row => {

    row.addEventListener('mouseleave', () => row.style.background = '');

}

function renderSPEHistogram(canvasId, values, label, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || values.length < 2) return;
  const ctx = canvas.getContext('2d');
  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: values.map((_,i) => ''),
      datasets: [{
        label: label,
        data: values.sort((a,b)=>a-b),
        backgroundColor: withAlpha(color, 0.6),
        borderColor: color,
        borderWidth: 1,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        title: { display: true, text: label, color: appState.theme==='light'?'#2c3e50':'#e0e0e0' }
      },
      scales: {
        x: { display: false },
        y: { title: { display: true, text: '实验数' } }
      },
    }
  });
  _speCharts.push(chart);
}

  renderSPEScatter('speWvRT', validW.map(e => ({x: e.W_ms, y: e.spe_rt_d, label: e.pairKey})), 'W (反应窗口 ms)', 'SPE (RT d)', '#2196f3');
  renderSPEScatter('speTvRT', validT.map(e => ({x: e.T_ms, y: e.spe_rt_d, label: e.pairKey})), 'T (刺激时长 ms)', 'SPE (RT d)', '#9c27b0');

  // Summary stats
  const ld = document.getElementById('speLeftDetail');
  const wGroups = {};
  validW.forEach(e => { const k = e.W_ms; if (!wGroups[k]) wGroups[k] = []; wGroups[k].push(e.spe_rt_d); });
  ld.innerHTML = `
    <div style="font-weight:600;margin-bottom:4px;">W 窗口分析</div>
    <div style="font-size:0.75em;line-height:1.6;">
      <div><b>反应窗口与SPE相关性:</b> r=${pearsonR(validW.map(e=>e.W_ms), validW.map(e=>e.spe_rt_d)).toFixed(3)}</div>
      ${Object.entries(wGroups).sort((a,b)=>a[0]-b[0]).map(([w,ds]) => {
        const avg = ds.reduce((s,v)=>s+v,0)/ds.length;
        return `<div>W=${w}ms: N=${ds.length}, 平均SPE=${avg.toFixed(3)}</div>`;
      }).join('')}
    </div>
  `;
}

function renderSPEScatter(canvasId, points, xLabel, yLabel, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || points.length < 2) return;
  const ctx = canvas.getContext('2d');
  const textColor = appState.theme === 'light' ? '#5a6c7d' : '#90a4ae';
  const gridColor = appState.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)';

  const datasets = [{
    label: yLabel,
    data: points,
    backgroundColor: withAlpha(color, 0.6),
    borderColor: color,
    pointRadius: 5,
    pointHoverRadius: 8,
  }];

  // Linear regression
  const xs = points.map(p => p.x), ys = points.map(p => p.y);
  const fit = linearFit(xs, ys);
  if (fit) {
    const xMin = Math.min(...xs), xMax = Math.max(...xs);
    datasets.push({
      label: 'Linear trend',
      data: [{x: xMin, y: fit.slope*xMin+fit.intercept}, {x: xMax, y: fit.slope*xMax+fit.intercept}],
      borderColor: withAlpha('#f44336', 0.6),
      backgroundColor: 'transparent',
      pointRadius: 0, borderWidth: 1.5, borderDash: [6, 3], showLine: true,
    });
  }

  const chart = new Chart(ctx, {
    type: 'scatter',
    data: { datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: textColor, filter: item => !item.text.includes('trend') } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.dataset.label.includes('trend')) return '';
              const p = points[ctx.dataIndex];
              return p ? `${p.label}: ${xLabel}=${p.x}, SPE=${p.y.toFixed(3)}` : '';
            }
          }
        }
      },
      scales: {
        x: { title: { display: true, text: xLabel, color: textColor }, ticks: { color: textColor }, grid: { color: gridColor } },
        y: { title: { display: true, text: yLabel, color: textColor }, ticks: { color: textColor }, grid: { color: gridColor } },
      }
    }
  });
  _speCharts.push(chart);
}

// --- Individual Detail ---
async function renderSPEIndividual() {
  const ld = document.getElementById('speLeftDetail');
  ld.innerHTML = `
    <div style="font-weight:600;margin-bottom:6px;">选择实验查看个体详情</div>
    <input type="text" id="speSearchInput" placeholder="搜索实验名称..." style="width:100%;font-size:0.8em;padding:4px 8px;margin-bottom:6px;border:1px solid var(--border);border-radius:4px;background:var(--bg-card);color:var(--text);">
    <div id="speSearchResults" style="max-height:calc(100vh - 360px);overflow-y:auto;font-size:0.75em;"></div>
  `;
  const searchInput = document.getElementById('speSearchInput');
  const resultsDiv = document.getElementById('speSearchResults');

  async function updateSearch(q) {
    const data = await ensureSPEData();
    if (!data) return;
    const filtered = data.experiments.filter(e => e.pairKey.toLowerCase().includes(q.toLowerCase()));
    resultsDiv.innerHTML = filtered.slice(0, 50).map(e => `<div class="spe-exp-row" data-key="${e.pairKey}" style="padding:3px 6px;cursor:pointer;border-bottom:1px solid var(--border);">
      ${e.pairKey} <span style="color:${e.spe_rt_d!==null?(e.spe_rt_d>0?'#ff9800':'#2196f3'):'#888'}">${e.spe_rt_d!==null?'d='+e.spe_rt_d.toFixed(3):'N/A'}</span>
    </div>`).join('');
    resultsDiv.querySelectorAll('.spe-exp-row').forEach(row => {
      row.addEventListener('click', () => loadSPEDetail(row.dataset.key));
    });
  }
  searchInput.addEventListener('input', () => updateSearch(searchInput.value));
  updateSearch('');
}

async function loadSPEDetail(pairKey) {
  destroySPECharts();
  const rp = document.getElementById('speRightCharts');
  rp.innerHTML = '<div style="text-align:center;padding-top:40px;color:var(--accent);">⏳ 加载实验详情...</div>';
  try {
    _speDetailData = await fetchAPI('/api/spe/detail?key=' + encodeURIComponent(pairKey));
  } catch(e) {
    rp.innerHTML = '<div style="color:#f44336;">加载失败: '+e.message+'</div>';
    return;
  }
  if (_speDetailData.error) {
    rp.innerHTML = '<div style="color:#f44336;">'+_speDetailData.error+'</div>';
    return;
  }
  const d = _speDetailData;
  const subs = d.subjects || [];
  const ld = document.getElementById('speLeftDetail');
  ld.innerHTML = `
    <div style="font-weight:600;color:var(--accent);">${pairKey}</div>
    <div style="font-size:0.72em;line-height:1.6;color:var(--text-secondary);">
      <div>被试数: ${d.n_subjects} | 试次: ${d.n_total_trials}</div>
      <div>整体SPE(RT): <b>${d.overall_spe_rt_d !== null ? d.overall_spe_rt_d.toFixed(3) : 'N/A'}</b></div>
      <div>Self RT: ${d.overall_self_mean_rt}ms | Stranger RT: ${d.overall_stranger_mean_rt}ms</div>
      ${d.overall_self_acc !== null ? `<div>Self ACC: ${(d.overall_self_acc*100).toFixed(1)}% | Stranger ACC: ${(d.overall_stranger_acc*100).toFixed(1)}%</div>` : ''}
      <div>P: ${d.meta.P_parsed_ms||'N/A'} | T: ${d.meta.T_parsed_ms||'N/A'}ms | W: ${d.meta.W_parsed_ms||'N/A'}ms</div>
    </div>
    <div style="font-weight:600;margin-top:8px;margin-bottom:4px;">个体 SPE (按效应量排序)</div>
    <div style="max-height:calc(100vh - 500px);overflow-y:auto;font-size:0.7em;">
      ${subs.map(s => {
        const dVal = s.spe_rt_d;
        const barW = dVal !== null ? Math.min(100, Math.abs(dVal)*80) : 0;
        const bgColor = dVal !== null ? (dVal > 0 ? '#ff9800' : '#2196f3') : '#888';
        return `<div style="padding:2px 4px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:4px;">
          <span style="min-width:28px;">${s.subjectID}</span>
          <span style="flex:1;height:6px;background:var(--bg-hover);border-radius:3px;overflow:hidden;">
            <span style="display:block;height:100%;width:${barW}%;background:${bgColor};border-radius:3px;"></span>
          </span>
          <span style="min-width:42px;text-align:right;color:${bgColor};font-weight:600;">${dVal!==null?dVal.toFixed(3):'N/A'}</span>
        </div>`;
      }).join('')}
    </div>
  `;

  // Right: RT distributions and SPE chart
  rp.innerHTML = `
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <div style="flex:1;min-width:280px;height:280px;"><canvas id="speIndivRT"></canvas></div>
      <div style="flex:1;min-width:280px;height:280px;"><canvas id="speIndivSPE"></canvas></div>
    </div>
    <div style="height:280px;"><canvas id="speIndivWaterfall"></canvas></div>
  `;

  // RT distribution box plot style
  const selfRTs = subs.flatMap(s => Array(s.n_self).fill(s.self_mean_rt));
  const strangerRTs = subs.flatMap(s => Array(s.n_stranger).fill(s.stranger_mean_rt));
  renderSPEDualHist('speIndivRT', subs.map(s=>s.self_mean_rt).filter(v=>v!==null), subs.map(s=>s.stranger_mean_rt).filter(v=>v!==null), 'RT (ms)', '#ff9800', '#2196f3');

  // Per-subject SPE bar chart
  renderSPESubjectBars('speIndivSPE', subs.filter(s=>s.spe_rt_d!==null));

  // SPE waterfall (cumulative)
  renderSPEWaterfall('speIndivWaterfall', subs.filter(s=>s.spe_rt_d!==null));
}

function renderSPEDualHist(canvasId, selfVals, strangerVals, xLabel, colorSelf, colorStranger) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || selfVals.length < 2) return;
  const ctx = canvas.getContext('2d');
  const allVals = [...selfVals, ...strangerVals];
  const bins = 15;
  const binMin = Math.min(...allVals), binMax = Math.max(...allVals);
  const binW = (binMax - binMin) / bins || 1;
  const selfCounts = Array(bins).fill(0), strangerCounts = Array(bins).fill(0);
  selfVals.forEach(v => { const i = Math.min(bins-1, Math.floor((v-binMin)/binW)); selfCounts[i]++; });
  strangerVals.forEach(v => { const i = Math.min(bins-1, Math.floor((v-binMin)/binW)); strangerCounts[i]++; });
  const labels = Array.from({length:bins}, (_,i) => (binMin+binW*i).toFixed(0));

  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Self RT', data: selfCounts, backgroundColor: withAlpha(colorSelf, 0.5), borderColor: colorSelf, borderWidth: 1 },
        { label: 'Stranger RT', data: strangerCounts, backgroundColor: withAlpha(colorStranger, 0.5), borderColor: colorStranger, borderWidth: 1 },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { title: { display: true, text: xLabel + ' 分布', color: appState.theme==='light'?'#2c3e50':'#e0e0e0' } },
      scales: { x: { title: { display: true, text: xLabel } }, y: { title: { display: true, text: '被试数' } } }
    }
  });
  _speCharts.push(chart);
}

function renderSPESubjectBars(canvasId, subs) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || subs.length < 2) return;
  const ctx = canvas.getContext('2d');
  const colors = subs.map(s => s.spe_rt_d > 0 ? '#ff9800' : '#2196f3');
  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: subs.map(s => s.subjectID),
      datasets: [{
        label: 'SPE (RT d)',
        data: subs.map(s => s.spe_rt_d),
        backgroundColor: colors.map(c => withAlpha(c, 0.6)),
        borderColor: colors,
        borderWidth: 1,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      indexAxis: 'y',
      plugins: {
        title: { display: true, text: '各被试 SPE 效应量', color: appState.theme==='light'?'#2c3e50':'#e0e0e0' },
        legend: { display: false }
      },
      scales: {
        x: { title: { display: true, text: "Cohen's d" } },
        y: { ticks: { font: { size: 9 } } }
      }
    }
  });
  _speCharts.push(chart);
}

function renderSPEWaterfall(canvasId, subs) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || subs.length < 2) return;
  const ctx = canvas.getContext('2d');
  const sorted = [...subs].sort((a,b) => b.spe_rt_d - a.spe_rt_d);
  const labels = sorted.map(s => s.subjectID);
  const data = sorted.map(s => s.spe_rt_d);
  const colors = data.map(d => d > 0 ? '#ff9800' : '#2196f3');
  const chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        label: 'SPE (RT d)',
        data,
        backgroundColor: colors.map(c => withAlpha(c, 0.6)),
        borderColor: colors,
        borderWidth: 1,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: 'SPE 瀑布图 (按效应量降序)', color: appState.theme==='light'?'#2c3e50':'#e0e0e0' },
        legend: { display: false }
      },
      scales: {
        x: { ticks: { font: { size: 8 }, maxRotation: 90 } },
        y: { title: { display: true, text: "Cohen's d" } }
      }
    }
  });
  _speCharts.push(chart);
}

function linearFit(xs, ys) {
  const n = xs.length;
  if (n < 2) return null;
  let sx=0, sy=0, sxx=0, sxy=0;
  for (let i=0; i<n; i++) { sx+=xs[i]; sy+=ys[i]; sxx+=xs[i]*xs[i]; sxy+=xs[i]*ys[i]; }
  const denom = n*sxx - sx*sx;
  if (denom === 0) return null;
  const slope = (n*sxy - sx*sy) / denom;
  const intercept = (sy - slope*sx) / n;
  return { slope, intercept };
}

function pearsonR(xs, ys) {
  const n = xs.length;
  if (n < 3) return 0;
  let sx=0,sy=0,sxx=0,syy=0,sxy=0;
  for (let i=0;i<n;i++){sx+=xs[i];sy+=ys[i];sxx+=xs[i]*xs[i];syy+=ys[i]*ys[i];sxy+=xs[i]*ys[i];}
  const denom = Math.sqrt((n*sxx-sx*sx)*(n*syy-sy*sy));
  return denom===0 ? 0 : (n*sxy - sx*sy)/denom;
}
