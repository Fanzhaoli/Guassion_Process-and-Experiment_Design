<style>

body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; transition: background 0.3s, color 0.3s; }
.header { background: linear-gradient(135deg, var(--bg-secondary), var(--bg-tertiary)); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--border); }

.section-title::before { content: ''; width: 4px; height: 18px; background: var(--accent); border-radius: 2px; }

.data-preview table { width: 100%; border-collapse: collapse; font-size: 0.78em; }

select, input, button { background: var(--bg-secondary); border: 1px solid var(--border-light); color: var(--text-primary); padding: 6px 12px; border-radius: 4px; font-size: 0.85em; cursor: pointer; transition: all 0.2s; }
select:focus, input:focus { outline: none; border-color: var(--accent); }
button { background: var(--button-bg); border-color: var(--button-bg); color: #fff; }

button.active-btn { background: var(--accent); color: #fff; border-color: var(--accent); }

.file-list { max-height: 280px; overflow-y: auto; }
.file-item { padding: 8px 10px; cursor: pointer; border-radius: 4px; margin: 2px 0; transition: all 0.2s; display: flex; justify-content: space-between; align-items: center; font-size: 0.82em; }
.file-item:hover { background: rgba(100,181,246,0.1); }
.file-item.selected { background: rgba(100,181,246,0.2); border: 1px solid var(--accent); }
.file-item .badge { font-size: 0.75em; padding: 2px 8px; border-radius: 10px; }

.legend-row { display: flex; gap: 16px; margin: 8px 0; font-size: 0.8em; }

.group-tabs { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }

.tooltip-info { font-size: 0.75em; color: var(--text-secondary); margin-top: 4px; }
.slider-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
.slider-row input[type="range"] { flex: 1; accent-color: var(--accent); }
.slider-row span { font-size: 0.8em; color: var(--accent); min-width: 30px; text-align: right; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-card); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 6px; font-size: 0.85em; z-index: 1000; animation: slideIn 0.3s ease; }
.toast.info { background: var(--toast-info-bg); color: var(--accent); border: 1px solid var(--accent); }
.toast.error { background: var(--toast-error-bg); color: #d32f2f; border: 1px solid #d32f2f; }
@keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* дё»йўҳеҲҮжҚўжҢүй’® */
.theme-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 6px 12px; border-radius: 20px; background: var(--bg-secondary); border: 1px solid var(--border); transition: all 0.2s; }

<body>

<div class="header">
  <div>
    <h1>й«ҳж–ҜиҝҮзЁӢе®һйӘҢи®ҫи®Ў - ж•°жҚ®еҸҜи§ҶеҢ–еҲҶжһҗе№іеҸ°</h1>
    <div class="subtitle">Shape-Label Association Task | Matching/NonMatching DDM Analysis</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">

      <option value="all">жүҖжңүз»„еҲ«</option>

    <div class="theme-toggle" id="themeToggle" title="еҲҮжҚўдё»йўҳ">
      <svg id="themeIcon" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>

</div>

<div class="tab-nav">

  <button class="tab-btn" data-tab="tab-visualization">дәӨдә’ејҸCRFеҸҜи§ҶеҢ–</button>

<script>
const API = window.location.origin;

let appState = {
  currentTab: 'tab-experiment',
  allFiles: [],
  selectedFile: null,
  currentData: null,
  allData: null,
  activeFilters: { matching: true, nonMatching: true, self: true, stranger: true, correctOnly: false },
  quantileN: 5,
  selectedGroups: new Set([1,2,3,4,5,6,7,8]),
  theme: 'dark',
};

// дё»йўҳеҲҮжҚўеҠҹиғҪ
function initTheme() {
  const savedTheme = localStorage.getItem('viz-theme') || 'dark';
  setTheme(savedTheme);
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
}

function setTheme(theme) {
  appState.theme = theme;
  if (theme === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    document.getElementById('themeText').textContent = 'жҡ—иүІ';
    document.getElementById('themeIcon').innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
  } else {
    document.documentElement.removeAttribute('data-theme');
    document.getElementById('themeText').textContent = 'дә®иүІ';
    document.getElementById('themeIcon').innerHTML = '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>';
  }
  localStorage.setItem('viz-theme', theme);
  updateChartTheme();
}

function toggleTheme() {
  const newTheme = appState.theme === 'dark' ? 'light' : 'dark';
  setTheme(newTheme);
}

function updateChartTheme() {
  const textColor = appState.theme === 'light' ? '#5a6c7d' : '#90a4ae';
  const gridColor = appState.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)';
  
  [rtChart, crfChartInst, speChartInst, designBubbleInst, designQualityInst, designSensitivityInst].forEach(chart => {
    if (chart && chart.options) {
      if (chart.options.scales) {
        Object.values(chart.options.scales).forEach(scale => {
          if (scale.title) scale.title.color = textColor;
          if (scale.ticks) scale.ticks.color = textColor;
          if (scale.grid) scale.grid.color = gridColor;
        });
      }
      if (chart.options.plugins && chart.options.plugins.legend && chart.options.plugins.legend.labels) {
        chart.options.plugins.legend.labels.color = appState.theme === 'light' ? '#2c3e50' : '#e0e0e0';
      }
      if (chart.options.plugins && chart.options.plugins.title) {
        chart.options.plugins.title.color = appState.theme === 'light' ? '#2c3e50' : '#e0e0e0';
      }
      chart.update('none');
    }
  });
}

async function fetchAPI(path) {
  try {
    const res = await fetch(`${API}${path}`);
    document.getElementById('globalStatus').textContent = 'е·ІиҝһжҺҘ';
    document.getElementById('globalStatus').style.color = '#4caf50';
    return await res.json();
  } catch(e) {
    document.getElementById('globalStatus').textContent = 'жңҚеҠЎеҷЁзҰ»зәҝ';
    document.getElementById('globalStatus').style.color = '#f44336';
    showToast('ж— жі•иҝһжҺҘжңҚеҠЎеҷЁпјҢиҜ·е…ҲиҝҗиЎҢ app_server.py', 'error');
    throw e;
  }
}

function showToast(msg, type='info') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function generateGroupOptions() {
  const sel = document.getElementById('globalGroupFilter');
  const groupTabs = document.querySelector('.group-tabs');
  [1,2,3,4,5,6,7,8].forEach(g => {
    const opt = document.createElement('option');
    opt.value = g;
    const labels = {1:'G1 exclude',2:'G2 exclude',3:'G3 caution',4:'G4 good',5:'G5 good',6:'G6 good',7:'G7 good',8:'G8 good'};
    opt.textContent = labels[g];
    sel.appendChild(opt);
  });
}

function initTabs() {
  document.querySelectorAll('.tab-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      appState.currentTab = b.dataset.tab;
      renderTabContent();
    });
  });
}

function renderTabContent() {
  const lp = document.getElementById('leftPanel');
  const rp = document.getElementById('vizArea');
  switch(appState.currentTab) {
    case 'tab-experiment': renderExperimentTab(lp, rp); break;
    case 'tab-data': renderDataTab(lp, rp); break;
    case 'tab-visualization': renderVisualizationTab(lp, rp); break;
    case 'tab-design': renderDesignTab(lp, rp); break;
  }
}

// ==================== TAB 1: EXPERIMENT SIMULATOR ====================
function renderExperimentTab(lp, rp) {
  lp.innerHTML = `
    <div class="section-title">е®һйӘҢеҸӮж•°й…ҚзҪ®</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <div><label style="font-size:0.8em;color:var(--text-secondary);">иў«иҜ•зј–еҸ· (Subject ID)</label>
        <input type="number" id="simSubjectID" value="1" min="1" style="width:100%;"></div>
      <div><label style="font-size:0.8em;color:var(--text-secondary);">з»„еҲ« (Group ID)</label>
        <select id="simGroupID" style="width:100%;">
          ${[1,2,3,4,5,6,7,8].map(g => `<option value="${g}">G${g}</option>`).join('')}
        </select></div>
      <button id="btnSimParams">жҹҘиҜўе®һйӘҢеҸӮж•°</button>
    </div>
    <div id="simParamsResult" style="margin-top:12px;font-size:0.82em;"></div>
    <div class="section-title" style="margin-top:16px;">иҜ•ж¬ЎжЁЎжӢҹ</div>
    <div style="display:flex;gap:8px;">
      <button onclick="simTrial('square','self')" class="active-btn" style="flex:1;">в–Ў + Self</button>
      <button onclick="simTrial('square','stranger')" style="flex:1;">в–Ў + Stranger</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button onclick="simTrial('circle','self')" style="flex:1;">в—Ӣ + Self</button>
      <button onclick="simTrial('circle','stranger')" style="flex:1;">в—Ӣ + Stranger</button>
    </div>
    <div class="section-title" style="margin-top:16px;">ж•°жҚ®иҮӘжҹҘ</div>
    <div style="display:flex;flex-direction:column;gap:8px;">
      <select id="verifyFileSelect" style="width:100%;">
        <option value="">-- йҖүжӢ©ж•°жҚ®ж–Үд»¶иҝӣиЎҢж ЎйӘҢ --</option>
      </select>
      <div style="display:flex;gap:8px;">
        <button id="btnVerifyFile" style="flex:1;">ж ЎйӘҢеҪ“еүҚж–Үд»¶</button>
        <button id="btnVerifyAll" style="flex:1;" class="danger">жү№йҮҸж ЎйӘҢе…ЁйғЁж–Үд»¶</button>
      </div>
    </div>
    <div id="verifyStatus" style="font-size:0.75em;color:var(--text-secondary);margin-top:8px;"></div>

    <div id="keyMappingRules" style="font-size:0.82em;background:var(--bg-card);padding:12px;border-radius:6px;line-height:1.8;"></div>
  `;
  rp.innerHTML = `
    <div class="chart-container" style="text-align:center;">
      <div class="section-title">иҜ•ж¬ЎжЁЎжӢҹжҳҫзӨә</div>
      <div class="sim-display" id="simDisplay">
        <div id="simShape" class="sim-shape sim-square"></div>
        <div class="sim-label" id="simLabel">Self</div>
        <div style="color:var(--text-secondary);">иҜ·зӮ№еҮ»е·Ұдҫ§жҢүй’®жЁЎжӢҹиҜ•ж¬Ў</div>
        <div id="simFeedback" style="margin-top:10px;"></div>
      </div>
    </div>
    <div class="chart-container">
      <div class="section-title">4иҜ•ж¬ЎеҫӘзҺҜйҖ»иҫ‘иҜҙжҳҺ</div>
      <div id="cycleExplanation" style="font-size:0.82em;line-height:1.8;"></div>
    </div>
    <div class="chart-container" id="verifyResultContainer" style="display:none;">
      <div class="section-title" id="verifyResultTitle">ж•°жҚ®иҮӘжҹҘз»“жһң</div>
      <div id="verifyResultSummary" style="margin-bottom:12px;"></div>
      <div class="data-preview" id="verifyErrorList" style="max-height:350px;">
        <div style="padding:16px;text-align:center;color:var(--text-secondary);">зӯүеҫ…ж ЎйӘҢ...</div>
      </div>
    </div>
  `;
  document.getElementById('btnSimParams').addEventListener('click', queryExperimentParams);
  document.getElementById('simSubjectID').addEventListener('change', queryExperimentParams);
  document.getElementById('btnVerifyFile').addEventListener('click', () => doVerifyFile(false));

async function queryExperimentParams() {
  const sid = document.getElementById('simSubjectID').value;
  const gid = document.getElementById('simGroupID').value;

async function simTrial(shape, label) {
  const sid = document.getElementById('simSubjectID').value;
  const data = await fetchAPI(`/api/experiment/trial?subject=${sid}&shape=${shape}&label=${label}`);
  document.getElementById('simShape').className = `sim-shape sim-${shape}`;
  document.getElementById('simLabel').textContent = label === 'self' ? 'иҮӘжҲ‘ (Self)' : 'з”ҹдәә (Stranger)';
  const isMatch = data.condition === 'Matching';
  document.getElementById('simFeedback').innerHTML = `
    <div class="sim-result ${isMatch?'match':'nonmatch'}">${data.condition} вҶ’ жӯЈзЎ®жҢүй”®: <b>${data.correctKey.toUpperCase()}</b> (${data.matchKey.toUpperCase()}=еҢ№й…Қ, ${data.mismatchKey.toUpperCase()}=дёҚеҢ№й…Қ)</div>

function updateKeyMappingRules(sid) {
  const mod = sid % 4;
  const co = sid % 2 === 0 ? 'в–ЎвҶ”Self, в—ӢвҶ”Stranger' : 'в–ЎвҶ”Stranger, в—ӢвҶ”Self';
  const mk = ['f','j','j','f'][(sid-1)%4];
  const rules = {
    0: {sq_s:'F', sq_st:'J', ci_s:'J', ci_st:'F'},
    1: {sq_s:'J', sq_st:'F', ci_s:'F', ci_st:'J'},
    2: {sq_s:'J', sq_st:'F', ci_s:'F', ci_st:'J'},
    3: {sq_s:'F', sq_st:'J', ci_s:'J', ci_st:'F'},
  }[mod];
  document.getElementById('keyMappingRules').innerHTML = `
    <div><b>иў«иҜ•${sid}</b> (mod 4 = ${mod}) | жӯЈзЎ®й…ҚеҜ№: <b>${co}</b></div>
    <div style="margin-top:6px;">
      <table style="width:100%;font-size:0.9em;border-collapse:collapse;">
        <tr><th style="text-align:left;padding:4px;">еҪўзҠ¶-ж Үзӯҫ</th><th style="text-align:center;">жӯЈзЎ®й”®</th><th style="text-align:center;">жқЎд»¶</th></tr>
        <tr><td style="padding:4px;">в–Ў + Self</td><td style="text-align:center;color:#64b5f6;">${rules.sq_s}</td><td style="text-align:center;">${co.includes('Self')&&co.includes('в–Ў')?'Matching':'NonMatching'}</td></tr>
        <tr><td style="padding:4px;">в–Ў + Stranger</td><td style="text-align:center;color:#64b5f6;">${rules.sq_st}</td><td style="text-align:center;">${co.includes('Stranger')&&co.includes('в–Ў')?'Matching':'NonMatching'}</td></tr>
        <tr><td style="padding:4px;">в—Ӣ + Self</td><td style="text-align:center;color:#64b5f6;">${rules.ci_s}</td><td style="text-align:center;">${co.includes('Self')&&co.includes('в—Ӣ')?'Matching':'NonMatching'}</td></tr>
        <tr><td style="padding:4px;">в—Ӣ + Stranger</td><td style="text-align:center;color:#64b5f6;">${rules.ci_st}</td><td style="text-align:center;">${co.includes('Stranger')&&co.includes('в—Ӣ')?'Matching':'NonMatching'}</td></tr>
      </table>
    </div>
    <div style="margin-top:6px;">еҢ№й…Қй”®: <b style="color:#4caf50;">${mk.toUpperCase()}</b> | дёҚеҢ№й…Қй”®: <b style="color:#f44336;">${mk==='f'?'J':'F'}</b></div>
  `;
}

function updateCycleExplanation(sid) {
  const mod = sid % 4;
  const mk = ['f','j','j','f'][(sid-1)%4];
  document.getElementById('cycleExplanation').innerHTML = `
    <div><b>4иҜ•ж¬ЎеҫӘзҺҜ ({f, j, j, f})</b>: еҪ“еүҚиў«иҜ•${sid}, дҪҚзҪ®${(sid-1)%4+1}/4, еҢ№й…Қй”®=<b>${mk.toUpperCase()}</b></div>
    <div style="margin-top:6px;color:#90a4ae;">
      иў«иҜ•зј–еҸ· mod 4 еҶіе®ҡжҢүй”®жҳ е°„и§„еҲҷпјҢеҪўжҲҗ4з§Қиў«иҜ•й—ҙжЁЎејҸпјҡ
      <br>вҖў mod=0 (4зҡ„еҖҚж•°): F=еҢ№й…Қ, J=дёҚеҢ№й…Қ | в–ЎвҶ”Self/в—ӢвҶ”Stranger
      <br>вҖў mod=1 (4k+1): F=еҢ№й…Қ, J=дёҚеҢ№й…Қ | в–ЎвҶ”Stranger/в—ӢвҶ”Self
      <br>вҖў mod=2 (е…¶д»–еҒ¶ж•°): J=еҢ№й…Қ, F=дёҚеҢ№й…Қ | в–ЎвҶ”Self/в—ӢвҶ”Stranger
      <br>вҖў mod=3 (4k+3): J=еҢ№й…Қ, F=дёҚеҢ№й…Қ | в–ЎвҶ”Stranger/в—ӢвҶ”Self
      <br><br>жӯЈзЎ®й…ҚеҜ№з”ұ mod(subjectID, 2) еҶіе®ҡ: еҒ¶ж•°вҶ’в–ЎвҶ”Self, еҘҮж•°вҶ’в–ЎвҶ”Stranger

}

function populateVerifyFileSelect() {
  if (appState.allFiles.length > 0) {
    _populateSelect();
    return;
  }
  fetchAPI('/api/files').then(res => {
    appState.allFiles = res.files;

}
function _populateSelect() {
  const sel = document.getElementById('verifyFileSelect');
  if (!sel) return;
  appState.allFiles.forEach(f => {

    opt.value = f.name;
    opt.textContent = `${f.name} (G${f.groupID}-S${f.subjectID})`;

  });
}

async function doVerifyFile(batchMode) {
  const statusEl = document.getElementById('verifyStatus');
  const resultContainer = document.getElementById('verifyResultContainer');
  statusEl.innerHTML = '<span style="color:#ff9800;">вҸі ж ЎйӘҢдёӯпјҢиҜ·зЁҚеҖҷ...</span>';
  resultContainer.style.display = '';
  document.getElementById('verifyErrorList').innerHTML = '<div style="padding:16px;text-align:center;color:#ff9800;">жӯЈеңЁж ЎйӘҢж•°жҚ®ж–Үд»¶...</div>';
  document.getElementById('verifyResultSummary').innerHTML = '';

  if (batchMode) {
    // жү№йҮҸж ЎйӘҢ: е…ЁйғЁж–Үд»¶йҖҗдёҖжЈҖжҹҘ
    const sampled = appState.allFiles.map(f => f.name).sort();

    let allPassed = true, totalErrors = 0, totalFiles = sampled.length;
    let summaryHTML = '';
    let errorDetailsHTML = '';

    for (let i = 0; i < sampled.length; i++) {
      const fname = sampled[i];
      statusEl.innerHTML = `<span style="color:#ff9800;">вҸі ж ЎйӘҢдёӯ (${i+1}/${totalFiles}): ${fname}</span>`;
      try {
        const result = await fetchAPI(`/api/verify/file?name=${encodeURIComponent(fname)}`);
        if (result.error) continue;
        totalErrors += result.totalErrors;
        if (!result.passed) allPassed = false;

        const statusIcon = result.passed ? 'вң…' : 'вқҢ';
        const statusColor = result.passed ? '#4caf50' : '#f44336';
        summaryHTML += `
          <div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:0.82em;">
            <span style="color:${statusColor};">${statusIcon}</span>
            <span><b>${fname}</b>: G${result.groupID}-S${result.subjectID} | жӯЈзЎ®зҺҮ:${result.stats.accuracy}% | йҒ—жјҸзҺҮ:${result.stats.omissionRate}% | й”ҷиҜҜ:${result.totalErrors}</span>
          </div>`;

        if (!result.passed && result.errors.length > 0) {
          errorDetailsHTML += `<div style="margin:4px 0;padding:6px 8px;background:rgba(244,67,54,0.08);border-radius:4px;font-size:0.78em;">
            <b style="color:#f44336;">${fname}</b> (${result.totalErrors}дёӘй”ҷиҜҜ):
            ${result.errors.slice(0, 5).map(e => `<div style="margin:2px 0;padding-left:8px;">вҖў ${e.detail}</div>`).join('')}
            ${result.totalErrors > 5 ? `<div style="color:#90a4ae;">...д»ҘеҸҠеҸҰеӨ– ${result.totalErrors-5} дёӘй”ҷиҜҜ</div>` : ''}
          </div>`;
        }
      } catch(e) {
        summaryHTML += `<div style="color:#f44336;">вқҢ ${fname}: ж ЎйӘҢеӨұиҙҘ</div>`;
      }
    }

    document.getElementById('verifyResultTitle').textContent = `жү№йҮҸиҮӘжҹҘз»“жһң (${totalFiles}дёӘж–Үд»¶)`;
    document.getElementById('verifyResultSummary').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="value">${totalFiles}</div><div class="label">ж ЎйӘҢж–Үд»¶ж•°</div></div>
        <div class="stat-card"><div class="value" style="color:${allPassed?'#4caf50':'#f44336'};">${allPassed?'PASS':'FAIL'}</div><div class="label">жҖ»дҪ“з»“жһң</div></div>
        <div class="stat-card"><div class="value" style="color:${totalErrors>0?'#f44336':'#4caf50'};">${totalErrors}</div><div class="label">жҖ»й”ҷиҜҜж•°</div></div>
        <div class="stat-card"><div class="value">${allPassed ? totalFiles : summaryHTML.split('вң…').length - 1}</div><div class="label">йҖҡиҝҮж–Үд»¶</div></div>
      </div>
      <div style="max-height:120px;overflow-y:auto;margin-top:8px;">${summaryHTML}</div>`;
    document.getElementById('verifyErrorList').innerHTML = errorDetailsHTML || '<div style="padding:16px;text-align:center;color:#4caf50;">жүҖжңүж–Үд»¶ж ЎйӘҢйҖҡиҝҮпјҢж— й”ҷиҜҜпјҒвң…</div>';
    statusEl.innerHTML = `<span style="color:${allPassed?'#4caf50':'#f44336'};">жү№йҮҸж ЎйӘҢе®ҢжҲҗ | ${totalFiles}ж–Үд»¶ | ${totalErrors}й”ҷиҜҜ</span>`;

  } else {
    // еҚ•ж–Үд»¶ж ЎйӘҢ
    const fname = document.getElementById('verifyFileSelect').value;
    if (!fname) {
      statusEl.innerHTML = '<span style="color:#f44336;">иҜ·е…ҲйҖүжӢ©ж•°жҚ®ж–Үд»¶</span>';
      return;
    }
    const result = await fetchAPI(`/api/verify/file?name=${encodeURIComponent(fname)}`);
    if (result.error) {
      statusEl.innerHTML = `<span style="color:#f44336;">й”ҷиҜҜ: ${result.error}</span>`;
      return;
    }

    const passed = result.passed;
    document.getElementById('verifyResultTitle').textContent = `ж•°жҚ®иҮӘжҹҘз»“жһң: ${fname}`;
    document.getElementById('verifyResultSummary').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card"><div class="value" style="color:${passed?'#4caf50':'#f44336'};">${passed?'вң… йҖҡиҝҮ':'вқҢ жңӘйҖҡиҝҮ'}</div><div class="label">ж ЎйӘҢз»“жһң</div></div>
        <div class="stat-card"><div class="value" style="color:${result.totalErrors>0?'#f44336':'#4caf50'};">${result.totalErrors}</div><div class="label">й”ҷиҜҜжҖ»ж•°</div></div>
        <div class="stat-card"><div class="value">${result.correctKeyErrors}</div><div class="label">CorrectKeyй”ҷиҜҜ</div></div>
        <div class="stat-card"><div class="value">${result.correctColumnErrors}</div><div class="label">CorrectеҲ—й”ҷиҜҜ</div></div>
        <div class="stat-card"><div class="value">${result.stats.accuracy}%</div><div class="label">жӯЈзЎ®зҺҮ</div></div>
        <div class="stat-card"><div class="value">${result.stats.omissionRate}%</div><div class="label">йҒ—жјҸзҺҮ</div></div>
      </div>
      <div style="margin-top:8px;font-size:0.78em;color:#90a4ae;background:var(--bg-card);padding:8px;border-radius:4px;">
        G${result.groupID}-S${result.subjectID} | еҢ№й…Қй”®: <b>${result.experimentParams.matchKey.toUpperCase()}</b> | дёҚеҢ№й…Қй”®: <b>${result.experimentParams.mismatchKey.toUpperCase()}</b>
        <br>P=${result.experimentParams.P} | T=${result.experimentParams.T}s | W=${result.experimentParams.W}s
        <br>жӯЈзЎ®й…ҚеҜ№: ${result.experimentParams.correctOrder}
      </div>`;

    if (passed) {
      document.getElementById('verifyErrorList').innerHTML = '<div style="padding:16px;text-align:center;color:#4caf50;">ж•°жҚ®ж–Үд»¶дёҺе®һйӘҢйҖ»иҫ‘е®Ңе…ЁдёҖиҮҙпјҢж— йңҖдҝ®жӯЈпјҒвң…</div>';
    } else {
      const errs = result.errors;
      let html = '<table><thead><tr><th>#</th><th>иҜ•ж¬Ў</th><th>еҪўзҠ¶</th><th>ж Үзӯҫ</th><th>зұ»еһӢ</th><th>жңҹжңӣеҖј</th><th>е®һйҷ…еҖј</th><th>е“Қеә”</th></tr></thead><tbody>';
      errs.slice(0, 100).forEach((e, i) => {
        html += `<tr>
          <td>${i+1}</td><td>${e.trialID}</td><td>${e.shape}</td><td>${e.label}</td>
          <td style="color:#f44336;"><b>${e.type}</b></td>
          <td style="color:#4caf50;">${e.expected}</td>
          <td style="color:#f44336;">${e.got}</td>
          <td>${e.response}</td>
        </tr>`;
      });
      if (result.errorCount > 100) {
        html += `<tr><td colspan="8" style="text-align:center;color:#90a4ae;">...д»ҘеҸҠеҸҰеӨ– ${result.errorCount - 100} дёӘй”ҷиҜҜпјҲд»…жҳҫзӨәеүҚ100жқЎпјү</td></tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('verifyErrorList').innerHTML = html;
    }
    statusEl.innerHTML = `<span style="color:${passed?'#4caf50':'#f44336'};">ж ЎйӘҢе®ҢжҲҗ: ${fname} | ${result.totalErrors}дёӘй”ҷиҜҜ</span>`;
  }
}

function renderFileList() {
  const search = (document.getElementById('fileSearch')?.value || '').toLowerCase();
  const filtered = appState.allFiles.filter(f => {
    if (!appState.selectedGroups.has(f.groupID)) return false;
    if (search && !f.name.toLowerCase().includes(search)) return false;
    return true;
  });
  const html = filtered.map(f => `
    <div class="file-item ${appState.selectedFile===f.name?'selected':''}" data-file="${f.name}">
      <div>
        <span style="color:#64b5f6;">${f.name}</span>
        <div style="font-size:0.7em;color:#90a4ae;">${f.groupLabel}</div>
      </div>
      <span class="badge badge-self">G${f.groupID}-S${f.subjectID}</span>
    </div>
  `).join('');
  document.getElementById('fileList').innerHTML = html || '<div style="padding:16px;text-align:center;color:#90a4ae;">ж— еҢ№й…Қж–Үд»¶</div>';

  document.querySelectorAll('.file-item').forEach(el => {
    el.addEventListener('click', () => loadDataFile(el.dataset.file));
  });
}

async function loadDataFile(filename) {
  appState.selectedFile = filename;
  appState.currentData = await fetchAPI(`/api/data/file?name=${encodeURIComponent(filename)}`);
  document.getElementById('previewTitle').textContent = filename;
  renderFileList();
  renderDataPreview();
  renderRTDistribution();
  updateDataStats();
}

function renderDataPreview() {
  if (!appState.currentData) return;
  const trials = appState.currentData.trials.slice(0, 100);
  const cols = ['trialID','Shape','Label','Condition','Identity','CorrectKey','Response','RT','Correct'];
  let html = '<table><thead><tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
  trials.forEach(t => {
    const rt = t.RT !== null ? t.RT.toFixed(3) : 'NA';
    html += `<tr>
      <td>${t.trialID}</td><td>${t.Shape}</td><td>${t.Label}</td>
      <td><span class="badge-${t.Condition==='Matching'?'matching':'nonmatching'}">${t.Condition}</span></td>
      <td><span class="badge-${t.Identity==='Self'?'self':'stranger'}">${t.Identity}</span></td>
      <td>${t.CorrectKey}</td><td>${t.Response}</td><td>${rt}</td>
      <td>${t.Correct===1?'вң“':t.Correct===0?'вң—':'-'}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  document.getElementById('dataPreview').innerHTML = html;
}

function updateDataStats() {
  if (!appState.currentData) return;

    <div class="stat-card"><div class="value">${s.total}</div><div class="label">жҖ»иҜ•ж¬Ў</div></div>
    <div class="stat-card"><div class="value">${s.formal}</div><div class="label">жӯЈејҸиҜ•ж¬Ў</div></div>

  `;
}

let rtChart = null;
function renderRTDistribution() {
  if (!appState.currentData) return;
  const rts = appState.currentData.trials.filter(t => t.RT !== null && t.stage === 'formal').map(t => t.RT);
  if (rts.length === 0) return;
  const bins = 30;
  const min = Math.min(...rts), max = Math.max(...rts);
  const bw = (max - min) / bins;
  const hist = new Array(bins).fill(0);
  rts.forEach(v => { const idx = Math.min(Math.floor((v-min)/bw), bins-1); hist[idx]++; });

  const ctx = document.getElementById('rtHistogram').getContext('2d');
  if (rtChart) rtChart.destroy();
  rtChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Array.from({length:bins}, (_,i) => (min+i*bw).toFixed(2)),
      datasets: [{ label: 'йў‘ж¬Ў', data: hist, backgroundColor: 'rgba(100,181,246,0.5)', borderColor: '#64b5f6', borderWidth: 1 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { title: { display: true, text: 'RT (з§’)', color: appState.theme === 'light' ? '#5a6c7d' : '#90a4ae' }, ticks: { color: appState.theme === 'light' ? '#5a6c7d' : '#90a4ae', maxTicksLimit: 15 }, grid: { color: appState.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)' } },
        y: { title: { display: true, text: 'йў‘ж¬Ў', color: appState.theme === 'light' ? '#5a6c7d' : '#90a4ae' }, ticks: { color: appState.theme === 'light' ? '#5a6c7d' : '#90a4ae' }, grid: { color: appState.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

 * ===============
 * ж•°жҚ®жәҗ: 2_Data/Real_Data/UnExtact/raw/EXP_data_group*.csv (88дёӘж–Үд»¶)
 * APIз«ҜзӮ№: /api/data/file?name= (еҚ•ж–Үд»¶), /api/data/all?group= (иҒҡеҗҲ)
 *
 * ж•°жҚ®жөҒиҪ¬и·Ҝеҫ„:
 *   CSVж–Үд»¶ вҶ’ app_server.py parse вҶ’ JSON {trials[], stats, summary}
 *   вҶ’ еүҚз«Ҝ fetch вҶ’ appState.allData / appState.currentData
 *   вҶ’ getFilteredTrials() зӯӣйҖү
 *     - д»…дҝқз•ҷ stage==='formal' дё” RT !== null зҡ„иҜ•ж¬Ў
 *     - жҢү Matching/NonMatching, Self/Stranger, CorrectOnly жқЎд»¶иҝҮж»Ө
 *   вҶ’ computeCRF(trials, nQuantiles) еҲҶз®ұи®Ўз®—
 *     1. жҢү RT еҚҮеәҸжҺ’еәҸ
 *     2. зӯүе®ҪеҲҶжЎ¶ nQuantiles дёӘ (жңҖеҗҺдёҖдёӘжЎ¶еҸ–дҪҷж•°)
 *     3. жҜҸжЎ¶и®Ўз®—: rtMean(е№іеқҮеҖј), upperProp(MatchingжҜ”дҫӢ)
 *   вҶ’ Chart.js scatter-with-lines жёІжҹ“
 *
 * е…ій”®ж•°жҚ®еӯ—ж®ө:
 *   - RT: еҸҚеә”ж—¶(з§’), ж•°еҖјеһӢ, nullиЎЁзӨәйҒ—жјҸ
 *   - Condition: "Matching"/"NonMatching", з”ұShape+Label+subjectIDи®Ўз®—
 *   - Identity: "Self"/"Stranger", з”ұLabelеӯ—ж®өжҙҫз”ҹ
 *   - Correct: 0/1/null, жӯЈзЎ®/й”ҷиҜҜ/йҒ—жјҸ
 *   - stage: "practice"/"formal", д»…formalз”ЁдәҺеҲҶжһҗ
 *   - Response: "f"/"j"/"NA", иў«иҜ•жҢүй”®е“Қеә”
 *
 * SPE (Self-Processing Effect):
 *   SPE = P_Matching(Self) - P_Matching(Stranger)
 *   жӯЈеҖјиЎЁзӨәSelfжқЎд»¶дёӢжӣҙеҒҸеҗ‘MatchingйҖүжӢ©
 */

// === зӯӣйҖүжқЎд»¶chipжҢүй’® ===
function initCRFFilterChips() {
  const chips = {
    chipMatching: 'filtMatching',
    chipNonMatching: 'filtNonMatching',
    chipSelf: 'filtSelf',
    chipStranger: 'filtStranger',
    chipCorrect: 'filtCorrectOnly',
  };
  const colors = {
    chipMatching: { active: 'rgba(76,175,80,0.25)', inactive: 'rgba(76,175,80,0.08)', border: 'rgba(76,175,80,0.5)' },
    chipNonMatching: { active: 'rgba(244,67,54,0.25)', inactive: 'rgba(244,67,54,0.08)', border: 'rgba(244,67,54,0.5)' },
    chipSelf: { active: 'rgba(255,152,0,0.25)', inactive: 'rgba(255,152,0,0.08)', border: 'rgba(255,152,0,0.5)' },
    chipStranger: { active: 'rgba(33,150,243,0.25)', inactive: 'rgba(33,150,243,0.08)', border: 'rgba(33,150,243,0.5)' },
    chipCorrect: { active: 'rgba(156,39,176,0.2)', inactive: 'rgba(156,39,176,0.06)', border: 'rgba(156,39,176,0.4)' },
  };

  Object.entries(chips).forEach(([chipId, checkId]) => {
    const chip = document.getElementById(chipId);
    const checkbox = document.getElementById(checkId);
    if (!chip || !checkbox) return;

    const updateChipStyle = () => {
      const c = colors[chipId];
      if (checkbox.checked) {
        chip.style.background = c.active;
        chip.style.borderColor = c.border;
        chip.style.opacity = '1';
      } else {
        chip.style.background = c.inactive;
        chip.style.borderColor = 'rgba(128,128,128,0.2)';
        chip.style.opacity = '0.55';
      }
    };

    chip.addEventListener('click', (e) => {
      e.preventDefault();
      checkbox.checked = !checkbox.checked;
      updateChipStyle();
      updateCRFFilters();
    });
    updateChipStyle();
  });
}

function renderCRFFileList() {
  const search = (document.getElementById('crfFileSearch')?.value || '').toLowerCase();
  let filtered = appState.allFiles;
  if (search) {
    filtered = filtered.filter(f =>
      f.name.toLowerCase().includes(search) ||
      String(f.subjectID).includes(search) ||
      f.groupLabel.toLowerCase().includes(search)
    );
  }
  // жҢүз»„еҲ«зӯӣйҖү
  if (appState.selectedGroups.size < 8) {
    filtered = filtered.filter(f => appState.selectedGroups.has(f.groupID));
  }

  const groups = {};
  filtered.forEach(f => {
    if (!groups[f.groupID]) groups[f.groupID] = [];
    groups[f.groupID].push(f);
  });

  let html = '';
  Object.keys(groups).sort().forEach(gid => {
    const qualityMap = {1:'exclude',2:'exclude',3:'caution',4:'good',5:'good',6:'good',7:'good',8:'good'};
    html += `<div style="font-size:0.7em;color:var(--accent);padding:4px 8px 2px;font-weight:600;">G${gid} <span style="color:var(--text-secondary);font-weight:400;">[${qualityMap[gid]}]</span></div>`;
    groups[gid].forEach(f => {
      const sel = appState.selectedFile === f.name;
      html += `<div class="file-item ${sel?'selected':''}" data-file="${f.name}" style="padding:6px 8px;">
        <span style="font-size:0.78em;">S${f.subjectID} <span style="color:var(--text-secondary);">${f.name}</span></span>
      </div>`;
    });
  });

  const listEl = document.getElementById('crfFileList');
  if (!listEl) return;
  listEl.innerHTML = html || '<div style="padding:12px;text-align:center;color:var(--text-secondary);font-size:0.8em;">ж— еҢ№й…Қж–Үд»¶</div>';

  listEl.querySelectorAll('.file-item').forEach(el => {
    el.addEventListener('click', async () => {
      listEl.querySelectorAll('.file-item').forEach(e => e.classList.remove('selected'));
      el.classList.add('selected');
      const fname = el.dataset.file;
      appState.selectedFile = fname;
      appState.allData = null;
      document.getElementById('crfDataInfo').innerHTML = '<span style="color:#ff9800;">еҠ иҪҪдёӯ...</span>';
      try {
        appState.currentData = await fetchAPI(`/api/data/file?name=${encodeURIComponent(fname)}`);
        document.getElementById('crfDataInfo').textContent =
          `е·ІеҠ иҪҪ: ${fname} | G${appState.currentData.groupID}-S${appState.currentData.subjectID} | ${appState.currentData.stats.formal}жӯЈејҸиҜ•ж¬Ў | жӯЈзЎ®зҺҮ${appState.currentData.stats.accuracy}%`;
        document.getElementById('crfSingleInfo').textContent =
          `G${appState.currentData.groupID}-S${appState.currentData.subjectID} | йҒ—жјҸзҺҮ${appState.currentData.stats.omissionRate}%`;
        updateCRFChart();
      } catch(e) {
        document.getElementById('crfDataInfo').innerHTML = '<span style="color:#f44336;">еҠ иҪҪеӨұиҙҘ</span>';
      }
    });
  });
}

function updateCRFFilters() {
  appState.activeFilters = {
    matching: document.getElementById('filtMatching')?.checked ?? true,
    nonMatching: document.getElementById('filtNonMatching')?.checked ?? true,
    self: document.getElementById('filtSelf')?.checked ?? true,
    stranger: document.getElementById('filtStranger')?.checked ?? true,
    correctOnly: document.getElementById('filtCorrectOnly')?.checked ?? false,
  };
  // жӣҙж–°зӯӣйҖүж Үзӯҫ
  const active = [];
  if (appState.activeFilters.matching) active.push('Matching');
  if (appState.activeFilters.nonMatching) active.push('NonMatching');
  if (appState.activeFilters.self) active.push('Self');
  if (appState.activeFilters.stranger) active.push('Stranger');
  if (appState.activeFilters.correctOnly) active.push('CorrectOnly');
  const badge = document.getElementById('crfFilterBadge');
  if (badge) badge.textContent = active.length > 0 ? `(${active.join('+')})` : '';
  debounceCRF(() => updateCRFChart(), 100);
}

  const f = appState.activeFilters;
  const result = [];
  for (let i = 0; i < trials.length; i++) {
    const t = trials[i];
    if (t.stage !== 'formal') continue;
    if (t.RT === null) continue;
    if (!f.matching && t.Condition === 'Matching') continue;
    if (!f.nonMatching && t.Condition === 'NonMatching') continue;
    if (!f.self && t.Identity === 'Self') continue;
    if (!f.stranger && t.Identity === 'Stranger') continue;
    if (f.correctOnly && t.Correct !== 1) continue;
    result.push(t);
  }
  return result;
}

// === CRFи®Ўз®— ===
// upperProp = иў«иҜ•жҢү"еҢ№й…Қ"й”®зҡ„жҜ”дҫӢ (DDMдёҠиҫ№з•Ң), дёҚжҳҜCondition==Matching
// еҚідҪҝMatchingжқЎд»¶дёӯ,иў«иҜ•д№ҹеҸҜиғҪжҢүй”ҷй”®(жҢүдёҚеҢ№й…Қй”®), жҜ”дҫӢдёҚдјҡжҳҜ100%
function computeCRF(trials, nQuantiles) {
  if (trials.length < nQuantiles * 2) return null;
  const sorted = [...trials].sort((a, b) => a.RT - b.RT);
  const n = sorted.length;
  const qSize = Math.floor(n / nQuantiles);
  const bins = [];
  let start = 0;
  for (let i = 0; i < nQuantiles; i++) {
    const end = i === nQuantiles - 1 ? n : start + qSize;
    let rtSum = 0, nMatchResp = 0;
    for (let j = start; j < end; j++) {
      rtSum += sorted[j].RT;
      if (sorted[j].ResponseIsMatch) nMatchResp++;
    }
    const count = end - start;
    bins.push({ rtMean: rtSum / count, upperProp: nMatchResp / count, n: count });
    start = end;
  }
  return bins;
}

      <div class="src-step-header" style="background:${step.color}22;border-left:3px solid ${step.color};" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <span class="src-step-num" style="background:${step.color};">${i+1}</span>
        <span style="color:var(--text-primary);">${step.title}</span>
        <span style="font-size:0.7em;color:var(--text-secondary);margin-left:auto;">${step.lang}</span>
        <span style="font-size:0.7em;">в–¶</span>
      </div>
      <pre class="src-code-block">${escapeHTML(step.code)}</pre>
    </div>`;
  });
  container.innerHTML = html;
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function getDesignGroupSummary() {
  if (!appState.allData) return [];
  const summary = appState.allData.summary;
  const qualityMap = {1:'exclude',2:'exclude',3:'caution',4:'good',5:'good',6:'good',7:'good',8:'good'};
  const designMap = {1:{P:0,T:30,W:300},2:{P:0,T:30,W:600},3:{P:120,T:30,W:600},4:{P:120,T:80,W:600},
    5:{P:8,T:100,W:1100},6:{P:120,T:500,W:1500},7:{P:0,T:100,W:1100},8:{P:120,T:30,W:800}};
  const groups = {};
  summary.forEach(s => {
    const gid = s.groupID;
    if (!groups[gid]) {
      const d = designMap[gid];
      groups[gid] = { groupID: gid, P: d.P, T: d.T, W: d.W, quality: qualityMap[gid],
        totalTrials: 0, totalFormal: 0, totalResponses: 0, totalCorrect: 0, nSubjects: 0 };
    }
    groups[gid].totalTrials += s.total;
    groups[gid].totalFormal += s.formal;
    groups[gid].totalResponses += s.responses;
    groups[gid].totalCorrect += s.correct;
    groups[gid].nSubjects++;
  });
  return Object.values(groups).map(g => ({
    ...g,
    omissionRate: g.totalFormal > 0 ? ((g.totalFormal - g.totalResponses) / g.totalFormal * 100) : 0,
    accuracy: g.totalResponses > 0 ? (g.totalCorrect / g.totalResponses * 100) : 0,
  }));
}

function updateDesignCharts() {
  if (!appState.allData) return;
  const summary = getDesignGroupSummary();
  const showGood = document.getElementById('designQualityGood')?.checked ?? true;
  const showCaution = document.getElementById('designQualityCaution')?.checked ?? true;
  const showExclude = document.getElementById('designQualityExclude')?.checked ?? true;
  const filtered = summary.filter(g => {
    if (g.quality === 'good' && !showGood) return false;
    if (g.quality === 'caution' && !showCaution) return false;
    if (g.quality === 'exclude' && !showExclude) return false;
    return true;
  });

  renderDesignBubbleChart(filtered);
  renderDesignQualityChart(filtered);
  renderDesignSensitivityChart(filtered);
}

let designBubbleInst = null;
function renderDesignBubbleChart(groups) {
  const ctx = document.getElementById('designBubbleChart').getContext('2d');
  if (designBubbleInst) designBubbleInst.destroy();
  const colors = {good:'#4caf50',caution:'#ff9800',exclude:'#f44336'};
  const textColor = appState.theme === 'light' ? '#5a6c7d' : '#90a4ae';
  const gridColor = appState.theme === 'light' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.05)';
  const legendColor = appState.theme === 'light' ? '#2c3e50' : '#e0e0e0';
  designBubbleInst = new Chart(ctx, {
    type: 'bubble',
    data: {
      datasets: groups.map(g => ({
        label: `G${g.groupID} [${g.quality}]`,
        data: [{x: g.T, y: g.W, r: Math.max(8, g.P * 0.15)}],
        backgroundColor: colors[g.quality] + '88',
        borderColor: colors[g.quality],
        borderWidth: 2,
      }))
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        tooltip: {
          callbacks: {
            label: ctx => {
              const g = groups[ctx.datasetIndex];
              return `G${g.groupID}: P=${g.P}, T=${g.T}ms, W=${g.W}ms, ACC=${g.accuracy.toFixed(1)}%, Omission=${g.omissionRate.toFixed(1)}%`;
            }
          }
        },
        legend: { labels: { color: legendColor } }
      },
      scales: {
        x: { title: { display: true, text: 'T (ms)', color: textColor }, ticks: { color: textColor }, grid: { color: gridColor } },
        y: { title: { display: true, text: 'W (ms)', color: textColor }, ticks: { color: textColor }, grid: { color: gridColor } }
      }
    }
  });
}
